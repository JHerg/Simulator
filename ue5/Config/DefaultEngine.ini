; ── Cologne Drive (UE5) – Engine-Grundeinstellungen ──────────────────────────
; Wird beim Anlegen des echten UE5-Projekts (M0) übernommen/ergänzt.
; Hier vorab die wichtigen, konzeptrelevanten Defaults dokumentiert.

[/Script/EngineSettings.GameMapsSettings]
; GameDefaultMap=/Game/Cologne/Maps/L_Master.L_Master
; EditorStartupMap=/Game/Cologne/Maps/L_Master.L_Master

[/Script/Engine.RendererSettings]
; ── Lumen (Echtzeit-GI + Reflexionen) ──
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1
r.Lumen.HardwareRayTracing=0          ; Software-Lumen als breiter Fallback; High-End schaltet auf 1
; ── Nanite ──
r.Nanite.ProjectEnabled=True
; ── Virtual Shadow Maps (zu Lumen passend) ──
r.Shadow.Virtual.Enable=1
; ── Antialiasing: TSR (ersetzt unser SMAA/MSAA aus dem Prototyp) ──
r.AntiAliasingMethod=4
; ── Farb-/Tone-Mapping ──
r.DefaultFeature.AutoExposure=True
r.DefaultFeature.MotionBlur=False

[/Script/WorldPartitionEditor.WorldPartitionEditorSettings]
; World Partition für die ~4 km Strecke (Streaming statt Ladebalken)

; ── Georeferenz-Ursprung (identisch zum Prototyp / DT_Route) ──────────────────
; LAT0 = 50.9674, LNG0 = 6.9382  → Welt-Ursprung (0,0,0)
; Konvertierung lebt zentral in UGeoConvertLibrary (Source/.../GeoConvert).
; Diese Werte sind die Single Source of Truth – nie hartcodiert woanders!
