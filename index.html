<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Köln Fahrsimulator</title>
  <!-- Three.js wird per async/await geladen – korrekte Reihenfolge garantiert -->
  <style>
    #boot-screen{
      position:fixed;inset:0;z-index:9999;
      background:#001118;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:18px;

    #boot-err{color:#f55;font-size:14px;display:none;max-width:420px;line-height:1.7;}
  </style>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;overflow:hidden;font-family:Arial,sans-serif;touch-action:none;}
    canvas{display:block;}

    /* ── Fortschrittsbalken ─────────────────────────── */
    #prog{position:fixed;top:0;left:0;right:0;height:5px;background:#111;z-index:50;}
    #prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#0af,#0f8);transition:width .3s;}

    /* ── Titel-Bar ──────────────────────────────────── */
    #info{
      position:fixed;top:12px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.75);color:#fff;padding:6px 18px;
      border-radius:20px;font-size:13px;white-space:nowrap;
      border:1px solid #444;z-index:40;pointer-events:none;
    }

    /* ── Toast (Straßenname) ────────────────────────── */
    #toast{
      position:fixed;top:52px;left:50%;transform:translateX(-50%);
      background:rgba(10,80,220,.85);color:#fff;padding:5px 16px;
      border-radius:14px;font-size:13px;opacity:0;
      transition:opacity .4s;z-index:40;pointer-events:none;
    }

    /* ── Tachometer ─────────────────────────────────── */
    #speedo{
      position:fixed;z-index:40;pointer-events:none;
      background:rgba(0,0,0,.82);border:2px solid #444;border-radius:50%;
      width:100px;height:100px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    #speedo .v{font-size:30px;font-weight:bold;color:#0af;line-height:1;}
    #speedo .u{font-size:11px;color:#777;}

    /* ── Minimap ─────────────────────────────────────── */
    #mm{
      position:fixed;
      background:rgba(0,0,0,.8);border:2px solid #333;
      border-radius:8px;overflow:hidden;z-index:40;
    }

    /* ── OSM-Status ─────────────────────────────────── */
    #osm-lbl{
      position:fixed;top:12px;right:14px;
      background:rgba(0,0,0,.7);color:#aaa;
      padding:4px 10px;border-radius:8px;font-size:11px;
      z-index:40;transition:opacity .5s;
    }

    /* ── Tastaturhilfe (Desktop) ────────────────────── */
    #hint{
      position:fixed;top:58px;right:14px;
      background:rgba(0,0,0,.65);color:#bbb;
      padding:9px 13px;border-radius:8px;font-size:12px;
      line-height:1.9;z-index:40;pointer-events:none;
    }

    /* ── Mobile Steuerung ────────────────────────────── */
    #mctrl{
      position:fixed;bottom:0;left:0;right:0;height:115px;
      display:none;z-index:45;pointer-events:none;
    }
    /* Zeige mobile Buttons auf Touch-Geräten oder kleinen Bildschirmen */
    @media(pointer:coarse),(max-width:700px){
      #mctrl{display:block;}
      #hint{display:none;}
      #speedo{bottom:auto;top:14px;right:14px;}
      #mm{bottom:auto;top:14px;left:14px;}
    }
    @media(pointer:fine){
      #speedo{bottom:125px;right:20px;}
      #mm{bottom:125px;left:20px;}
    }

    .mbtn{
      position:absolute;pointer-events:all;
      display:flex;align-items:center;justify-content:center;
      border-radius:14px;font-size:24px;font-weight:bold;
      border:2px solid rgba(255,255,255,.25);
      background:rgba(0,0,0,.55);color:#fff;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      user-select:none;transition:background .1s;
    }
    .mbtn.on{background:rgba(50,100,255,.65);}
    #bl{bottom:20px;left:12px;width:68px;height:68px;}
    #br{bottom:20px;left:90px;width:68px;height:68px;}
    #bgas{bottom:20px;right:12px;width:88px;height:68px;background:rgba(0,120,0,.6);}
    #bbrk{bottom:20px;right:110px;width:68px;height:68px;background:rgba(160,0,0,.5);}
    /* ── Desktop: Speedo + Minimap immer sichtbar ──── */
    #speedo{ bottom:20px; right:20px; }
    #mm    { bottom:20px; left:20px;  }

    /* ── Fehler-Box ────────────────────────────────── */
    #err-box{
      display:none;position:fixed;inset:0;z-index:9999;
      background:rgba(0,0,0,.95);
      align-items:center;justify-content:center;flex-direction:column;
      color:#ff5555;text-align:center;padding:30px;font-size:15px;
    }
    #err-box h2{font-size:28px;margin-bottom:16px;}
    #err-box pre{background:#111;color:#f88;padding:12px;border-radius:8px;
      font-size:11px;text-align:left;max-width:600px;overflow:auto;margin-top:12px;}
    #err-solution{background:#1a2a1a;color:#8f8;padding:12px 20px;
      border-radius:8px;margin-top:14px;font-size:13px;line-height:1.8;}
  </style>
</head>
<body>

<!-- ── Fehler-Overlay (erscheint wenn JS-Fehler) ── -->
<!-- Boot-Screen (verschwindet sobald Three.js geladen ist) -->
<div id="boot-screen">
  <div style="font-size:36px">🚗</div>

</div>

<div id="info">🚗 Köln · Altbaumburgweg → RheinEnergie Stadion</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  KÖLN FAHRSIMULATOR v2 – Async Boot-Loader
// ════════════════════════════════════════════════════════════════════════════

// Three.js dynamisch laden (async/await – korrekte Reihenfolge garantiert)
function loadScript(url) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = url;
    s.onload  = resolve;
    s.onerror = function() { reject(new Error('Konnte nicht laden: ' + url)); };
    document.head.appendChild(s);
  });
}

function bootMsg(text, pct) {
  document.getElementById('boot-msg').textContent = text;
  if (pct !== undefined)
    document.getElementById('boot-bar-fill').style.width = pct + '%';
}

function bootError(text) {
  document.getElementById('boot-err').style.display = 'block';
  document.getElementById('boot-err').innerHTML =
    '<strong>❌ ' + text + '</strong><br><br>' +
    'Öffne diese Seite über:<br>' +
    '<strong>https://jherg.github.io/Simulator/</strong><br>' +
    '<small>(GitHub Pages → immer verfügbar)</small>';
  document.getElementById('boot-msg').textContent = '';
}

async function boot() {
  const CDNs = [
    'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js',
    'https://unpkg.com/three@0.158.0/build/three.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js',
  ];

  let loaded = false;
  for (let i = 0; i < CDNs.length; i++) {
    const cdn = CDNs[i];
    bootMsg('Lade Three.js (' + cdn.split('/')[2] + ')…', 20 + i * 25);
    try {
      await loadScript(cdn);
      if (typeof THREE !== 'undefined') { loaded = true; break; }
    } catch(e) {
      console.warn('CDN fehlgeschlagen:', cdn);
    }
  }

  if (!loaded) {
    bootError('Three.js konnte von keinem CDN geladen werden.');
    return;
  }

  bootMsg('Baue Szene…', 80);
  // Kurze Pause damit Browser den Fortschrittsbalken rendern kann
  await new Promise(r => setTimeout(r, 60));

  try {
    startSimulator();
    document.getElementById('boot-screen').style.display = 'none';
  } catch(e) {
    bootError('Render-Fehler: ' + e.message);
    console.error(e);
  }
}

boot();

function startSimulator() {

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)
              || window.innerWidth < 700;

// ── Geo-Koordinaten → Szene (Meter) ─────────────────────────────────────────
// Referenzpunkt: Altbaumburgweg 2, 50739 Köln (exakt laut Routenplaner)
const LAT0 = 50.9674, LNG0 = 6.9382;
const mLat = 111320;
const mLng = mLat * Math.cos(LAT0 * Math.PI / 180);   // ≈ 70 030 m/°

function ll(lat, lng){ return { x:(lng-LNG0)*mLng, z:(LAT0-lat)*mLat }; }

// ══════════════════════════════════════════════════════════════════════════
//  ROUTE: Altbaumburgweg 2 (50739) → RheinEnergieSTADION  –  8,7 km
//  Quell-Koordinaten direkt vom Routenplaner des Nutzers
// ══════════════════════════════════════════════════════════════════════════
// ── Routen-Geometrie ──────────────────────────────────────────────────────────
// Alle Koordinaten aus exakten Szenen-Positionen berechnet:
//   x = 0  → Startpunkt (Altbaumburgweg, reine Südrichtung)
//   Jeder WP-Abstand entspricht der Navigationslänge der Straße.
//   Abbiegungen: Rechtskurve = heading sinkt (→ Westen),
//                Linkskurve  = heading steigt (→ Osten).
//   Szene → GPS:  lat = LAT0 − z/mLat   |   lng = LNG0 + x/mLng
const WP = [

  // ── 1. Altbaumburgweg  (6 m, 55 m südwärts) ──────────────────────────
  //   Startpunkt (0, 0)
  { street:"Altbaumburgweg",            ...ll(50.96740,6.93820), tl:false, width:6  },
  //   (0, 55) → 55 m Süd
  { street:"Altbaumburgweg",            ...ll(50.96691,6.93820), tl:false, width:6  },

  // ── 2. Trifelsstraße  (6 m, 187 m westwärts, RECHTS) ─────────────────
  //   (−93, 55) Mittelpunkt
  { street:"Trifelsstraße",             ...ll(50.96691,6.93687), tl:false, width:6  },
  //   (−187, 55) → 187 m West
  { street:"Trifelsstraße",             ...ll(50.96691,6.93553), tl:false, width:6  },

  // ── 3. Ebernburgweg  (6 m, 288 m südwärts, LINKS) ────────────────────
  //   (−187, 199) Mittelpunkt
  { street:"Ebernburgweg",              ...ll(50.96561,6.93553), tl:false, width:6  },
  //   (−187, 343) → 288 m Süd
  { street:"Ebernburgweg",              ...ll(50.96432,6.93553), tl:false, width:6  },

  // ── 4. Schiefersburger Weg  (7 m, 239 m westwärts, RECHTS) ──────────
  //   (−307, 343) Mittelpunkt
  { street:"Schiefersburger Weg",       ...ll(50.96432,6.93382), tl:false, width:7  },
  //   (−426, 343) → 239 m West
  { street:"Schiefersburger Weg",       ...ll(50.96432,6.93212), tl:false, width:7  },

  // ── 5. Escher Str.  (9 m, 666 m südwärts, 2. Ausfahrt KV) ──────────
  //   (−426, 510)
  { street:"Escher Str.",               ...ll(50.96282,6.93212), tl:false, width:9  },
  //   (−426, 677)
  { street:"Escher Str.",               ...ll(50.96132,6.93212), tl:false, width:9  },
  //   (−426, 843) Ampel
  { street:"Escher Str.",               ...ll(50.95983,6.93212), tl:true,  width:9  },
  //   (−426, 1009) → 666 m Süd
  { street:"Escher Str.",               ...ll(50.95834,6.93212), tl:false, width:9  },

  // ── 6. Parkgürtel  (12 m, 647 m westwärts, RECHTS auffahren) ─────────
  //   (−749, 1009) Mittelpunkt
  { street:"Parkgürtel",                ...ll(50.95834,6.92751), tl:false, width:12 },
  //   (−1073, 1009) → 647 m West
  { street:"Parkgürtel",                ...ll(50.95834,6.92289), tl:false, width:12 },

  // ── 7. Auffahrt Richtung Zentrum / K4  (10 m, 357 m südwärts, LINKS) ─
  //   (−1073, 1187)
  { street:"Auffahrt Richtung Zentrum", ...ll(50.95674,6.92289), tl:false, width:10 },
  //   (−1073, 1366) → 357 m Süd
  { street:"Auffahrt Richtung Zentrum", ...ll(50.95513,6.92289), tl:false, width:10 },

  // ── 8. Innere Kanalstraße / K4  (14 m, 2.462 m südwärts) ─────────────
  //   (−1073, 1958)
  { street:"Innere Kanalstraße",        ...ll(50.94981,6.92289), tl:false, width:14 },
  //   (−1073, 2450) Ampel
  { street:"Innere Kanalstraße",        ...ll(50.94539,6.92289), tl:true,  width:14 },
  //   (−1073, 2942)
  { street:"Innere Kanalstraße",        ...ll(50.94097,6.92289), tl:false, width:14 },
  //   (−1073, 3434) Ampel
  { street:"Innere Kanalstraße",        ...ll(50.93655,6.92289), tl:true,  width:14 },
  //   (−1073, 3828) → 2.462 m Süd
  { street:"Innere Kanalstraße",        ...ll(50.93300,6.92289), tl:false, width:14 },

  // ── 9. Aachener Str. B55  (18 m, 1.708 m westwärts, RECHTS) ──────────
  //   (−1500, 3828)
  { street:"Aachener Str.",             ...ll(50.93300,6.91680), tl:false, width:18 },
  //   (−1927, 3828) Ampel
  { street:"Aachener Str.",             ...ll(50.93300,6.91071), tl:true,  width:18 },
  //   (−2354, 3828)
  { street:"Aachener Str.",             ...ll(50.93300,6.90462), tl:false, width:18 },
  //   (−2781, 3828) → 1.708 m West
  { street:"Aachener Str.",             ...ll(50.93300,6.89852), tl:true,  width:18 },

  // ── 10. Kitschburger Str.  (8 m, 330 m südwärts, LINKS) ───────────────
  //   (−2781, 3993)
  { street:"Kitschburger Str.",         ...ll(50.93152,6.89852), tl:false, width:8  },
  //   (−2781, 4158) → 330 m Süd
  { street:"Kitschburger Str.",         ...ll(50.93004,6.89852), tl:false, width:8  },

  // ── 11. Friedrich-Schmidt-Str.  (10 m, 1.023 m westwärts, RECHTS KV) ─
  //   (−3122, 4158)
  { street:"Friedrich-Schmidt-Str.",    ...ll(50.93004,6.89366), tl:false, width:10 },
  //   (−3463, 4158)
  { street:"Friedrich-Schmidt-Str.",    ...ll(50.93004,6.88880), tl:false, width:10 },
  //   (−3804, 4158) → 1.023 m West
  { street:"Friedrich-Schmidt-Str.",    ...ll(50.93004,6.88393), tl:false, width:10 },

  // ── 12. Junkersdorfer Str.  (10 m, ~720 m nordwestwärts zum Stadion) ──
  //   (−4113, 3972) Mittelpunkt
  { street:"Junkersdorfer Str.",        ...ll(50.93172,6.87951), tl:false, width:10 },

  // ── Ziel: RheinEnergieSTADION  (−4422, 3785) ─────────────────────────
  { name:"RheinEnergie Stadion 🏟", street:"RheinEnergie Stadion",
    ...ll(50.9334,6.8751), tl:false, width:14 },
];

// ── Renderer ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile });
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = !isMobile;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;

// ── Szene ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6ab4e8);
scene.fog = new THREE.Fog(0x6ab4e8, 150, isMobile ? 600 : 1100);

// ── Kamera (Cockpit) ─────────────────────────────────────────────────────────
const cam = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.2, isMobile ? 700 : 1300);
cam.rotation.order = 'YXZ';

// ── Beleuchtung ───────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff5d0, 1.4);
sun.position.set(-300, 600, -200);
if (!isMobile) {
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left = sun.shadow.camera.bottom = -500;
  sun.shadow.camera.right = sun.shadow.camera.top  =  500;
  sun.shadow.camera.far = 1400;
}
scene.add(sun);
scene.add(new THREE.AmbientLight(0xc8d8ff, 0.65));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x345a20, 0.45));

// ── Boden ─────────────────────────────────────────────────────────────────────
// Boden deckt die gesamte Route ab: Start (0,0) → Stadion (~-3900m, ~5300m)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(9000, 10000),
  new THREE.MeshLambertMaterial({ color: 0x3c6b2c })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(-1900, 0, 2700);
ground.receiveShadow = true;
scene.add(ground);

// ── Hilfsfunktion: Straßensegment-Geometrie (vertex-basiert, kein lookAt) ────
function roadGeo(ax, az, bx, bz, width, y) {
  const dx = bx - ax, dz = bz - az;
  const len = Math.hypot(dx, dz);
  const nx = -dz / len, nz = dx / len; // Normale (senkrecht zur Fahrtrichtung)
  const hw = width / 2;
  const geo = new THREE.BufferGeometry();
  // 4 Ecken: AL, AR, BR, BL
  geo.setAttribute('position', new THREE.Float32BufferAttribute([
    ax - nx*hw, y, az - nz*hw,
    ax + nx*hw, y, az + nz*hw,
    bx + nx*hw, y, bz + nz*hw,
    bx - nx*hw, y, bz - nz*hw,
  ], 3));
  geo.setIndex([0,1,2, 0,2,3]);
  geo.computeVertexNormals();
  return geo;
}

// ── Hauptroute aufbauen ───────────────────────────────────────────────────────
(function buildRoute() {
  const asphalt   = new THREE.MeshLambertMaterial({ color: 0x2e2e2e });
  const sidewalk  = new THREE.MeshLambertMaterial({ color: 0xb8a898 });
  const dashMat   = new THREE.MeshBasicMaterial({ color: 0xeeeecc });

  for (let i = 0; i < WP.length - 1; i++) {
    const A = WP[i], B = WP[i+1];
    const rw = A.width || 8; // Straßenbreite aus WP oder Standard 8m

    // Asphalt
    scene.add(new THREE.Mesh(roadGeo(A.x,A.z,B.x,B.z, rw, 0.01), asphalt));
    // Gehwege (1.5m Bürgersteig je Seite)
    scene.add(new THREE.Mesh(roadGeo(A.x,A.z,B.x,B.z, rw+3, 0.005), sidewalk));

    // Mittellinien (gestrichelt durch kurze Segmente)
    const segLen = Math.hypot(B.x-A.x, B.z-A.z);
    const steps  = Math.floor(segLen / 10);
    for (let s = 0; s < steps; s++) {
      const t0 = (s + 0.1) / steps;
      const t1 = (s + 0.6) / steps;
      const x0 = A.x + (B.x-A.x)*t0, z0 = A.z + (B.z-A.z)*t0;
      const x1 = A.x + (B.x-A.x)*t1, z1 = A.z + (B.z-A.z)*t1;
      scene.add(new THREE.Mesh(roadGeo(x0,z0,x1,z1, 0.2, 0.02), dashMat));
    }
  }
})();

// ── Straßenschilder (deutsche blaue Schilder, Canvas-Texturen) ───────────────
(function makeStreetSigns() {
  const postMat = new THREE.MeshLambertMaterial({ color: 0x999999 });
  let prevStreet = '';

  for (let i = 1; i < WP.length; i++) {
    const wp   = WP[i];
    const prev = WP[i - 1];
    if (wp.street === prevStreet) continue;
    prevStreet = wp.street;

    // Richtungsvektor des Segments
    const dx = wp.x - prev.x, dz = wp.z - prev.z;
    const len = Math.hypot(dx, dz);
    if (len < 1) continue;
    const nx = -dz / len, nz = dx / len; // Senkrecht links

    // Canvas-Textur (deutsches Straßenschild, blau)
    const cv = document.createElement('canvas');
    cv.width = 400; cv.height = 80;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#002288';
    ctx.fillRect(0, 0, 400, 80);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 4;
    ctx.strokeRect(4, 4, 392, 72);
    ctx.fillStyle = '#ffffff';
    const label = wp.street.replace(' 🏟', '');
    const fs = label.length > 18 ? 22 : 28;

(function buildBuildings() {
  const COLORS  = [0xd4a574,0xc9b8a2,0xbbb0a5,0xe8d8b8,0xa8946e,0xcc9966,0x9b8b7a,0xd0c0a0];
  const winMat  = new THREE.MeshBasicMaterial({ color:0xffffbb });
  const rng = (() => { let s=1234567; return ()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; }; })();

  const spacing = isMobile ? 30 : 18;

  for (let i = 0; i < WP.length-1; i++) {
    const A = WP[i], B = WP[i+1];
    const dx = B.x-A.x, dz = B.z-A.z;
    const len = Math.hypot(dx, dz);
    const ux = dx/len, uz = dz/len;  // Richtung
    const nx = -uz, nz = ux;         // Senkrecht

    const count = Math.floor(len / spacing);
    for (let k = 0; k < count; k++) {
      const t = (k + 0.5) / count;
      const bx = A.x + dx*t, bz = A.z + dz*t;

      [-1,1].forEach(side => {
        const w = 7  + rng()*11;
        const h = 5  + rng()*25;
        const d = 7  + rng()*10;
        const roadHW = (WP[i].width||8)/2;
        const off = roadHW + Math.max(w,d)/2 + 3 + rng()*4; // Mindestabstand: Straßenrand + halbe Gebäudebreite + Gehweg

        const px = bx + nx*side*off + (rng()-.5)*3;
        const pz = bz + nz*side*off + (rng()-.5)*3;

        const mat  = new THREE.MeshLambertMaterial({ color: COLORS[Math.floor(rng()*COLORS.length)] });
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        mesh.position.set(px, h/2, pz);
        if (!isMobile) mesh.castShadow = mesh.receiveShadow = true;
        scene.add(mesh);

        // Fenster
        if (h > 8 && !isMobile) {
          for (let wy = 2; wy < h-1; wy += 3.5) {
            for (let wx = -w/2+1.2; wx < w/2-0.8; wx += 2.8) {
              const wm = new THREE.Mesh(new THREE.PlaneGeometry(1,1.4), winMat);
              wm.position.set(px+wx, wy, pz + (side > 0 ? -d/2-0.02 : d/2+0.02));
              if (side < 0) wm.rotation.y = Math.PI;
              scene.add(wm);
            }
          }
        }
      });
    }
  }
})();

const trafficLights = [];

function makeTrafficLight(x, z, facing) {
  const g = new THREE.Group();
  // Mast
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08,0.09,5,8),
    new THREE.MeshLambertMaterial({ color:0x222222 })
  );
  pole.position.y = 2.5;
  g.add(pole);

  // Gehäuse
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(0.45,1.5,0.3),
    new THREE.MeshLambertMaterial({ color:0x111111 })
  );
  box.position.set(0, 5.25, 0);
  g.add(box);

  // Drei Lichter: [0]=rot [1]=gelb [2]=grün
  const yOff = [0.52, 0, -0.52];
  const onColors  = [0xff2200, 0xffaa00, 0x00dd00];
  const bulbs = yOff.map((yo, idx) => {
    const m = new THREE.Mesh(
      new THREE.CircleGeometry(0.14, 8),
      new THREE.MeshBasicMaterial({ color: 0x111111 })
    );
    m.position.set(0, 5.25+yo, 0.16);
    m.userData.on  = onColors[idx];
    m.userData.off = 0x111111;
    g.add(m);
    return m;
  });

  g.position.set(x, 0, z);
  if (facing !== undefined) g.rotation.y = facing;
  g.userData.bulbs = bulbs;
  g.userData.phase = Math.random() * 15;  // gestaffelte Phasen
  scene.add(g);
  trafficLights.push(g);
}

// Ampeln an markierten Wegpunkten (beidseitig)
WP.forEach((wp, i) => {
  if (!wp.tl || i === 0 || i >= WP.length-1) return;
  const prev = WP[i-1];
  const dx = wp.x - prev.x, dz = wp.z - prev.z;
  const len = Math.hypot(dx, dz);
  const nx = -dz/len, nz = dx/len;
  const facing = Math.atan2(dx, dz);

  makeTrafficLight(wp.x + nx* 6, wp.z + nz* 6, facing);
  makeTrafficLight(wp.x - nx* 6, wp.z - nz* 6, facing + Math.PI);
});

function updateTrafficLights(t) {
  trafficLights.forEach(tl => {
    const cycle = (t + tl.userData.phase) % 14;  // 14-Sekunden-Zyklus
    // 0–6s grün, 6–8s gelb, 8–14s rot
    let state; // 2=grün 1=gelb 0=rot
    if      (cycle < 6)  state = 2;
    else if (cycle < 8)  state = 1;
    else                 state = 0;

    tl.userData.bulbs.forEach((b, i) => {
      b.material.color.setHex(i === state ? b.userData.on : b.userData.off);
    });
    tl.userData.isRed = (state === 0);
  });
}

// ── Physik ────────────────────────────────────────────────────────────────────
const MAX_SPD = 22, ACCEL = 7, BRAKE = 16, DRAG = 1.6, STEER_SPD = 1.6;

function updateCar(dt) {
  // Eingabe zusammenführen
  let throttle = 0, braking = 0, steerIn = 0;

  if (keys['ArrowUp']   || keys['KeyW'] || touch.gas)   throttle = 1;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.brake)  braking  = 1;
  if (keys['Space'])                                      braking  = 2;
  // FIX: Links=Osten=heading+ / Rechts=Westen=heading-
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left)   steerIn  =  1;
  if (keys['ArrowRight']|| keys['KeyD'] || touch.right)  steerIn  = -1;

  // Gamepad
  const gp = getGamepadInput();
  if (gp) {
    const ax = gp.axes[0];
    if (Math.abs(ax) > 0.08) steerIn = -ax; // Gamepad-Achse invertieren (Thrustmaster: Links=-1)
    const rt = gp.buttons[7]?.value ?? 0;
    const lt = gp.buttons[6]?.value ?? 0;
    if (rt > 0.05) throttle = rt;
    if (lt > 0.05) braking  = lt;
    // Thrustmaster: Achse 1/2 könnten Pedale sein
    if (gp.axes.length > 2) {
      const gas   = (-gp.axes[1] + 1) / 2;  // -1=offen → 0, +1=gedrückt → 1
      const brake = (-gp.axes[2] + 1) / 2;
      if (gas   > 0.05) throttle = Math.max(throttle, gas);
      if (brake > 0.05) braking  = Math.max(braking,  brake);
    }
  }

  // KEIN Auto-Pilot – vollständig manuelles Fahren (Auto-Lenkung entfernt)
  // KEIN Auto-Gas – Geschwindigkeit bleibt wo Gas/Bremse sie lässt

  // Geschwindigkeit
  if (throttle > 0) car.speed = Math.min(MAX_SPD, car.speed + ACCEL * throttle * dt);
  else              car.speed = Math.max(0,        car.speed - DRAG * dt);
  if (braking  > 0) car.speed = Math.max(0,        car.speed - BRAKE * braking * dt);

  // Lenkung (sanft interpoliert)
  const sFactor = Math.min(1, car.speed / MAX_SPD);
  car.steer += (steerIn - car.steer) * 6 * dt;
  car.heading += car.steer * STEER_SPD * sFactor * dt;

  // Position
  car.x += Math.sin(car.heading) * car.speed * dt;
  car.z += Math.cos(car.heading) * car.speed * dt;

  // Lenkrad animieren (positives steer = Links → Lenkrad gegen Uhrzeigersinn)
  wheelGrp.rotation.z = car.steer * 0.55;

  checkWaypoint();
}

// ── Minimap ───────────────────────────────────────────────────────────────────
const mmCv  = document.getElementById('mm-cv');
const mmCtx = mmCv.getContext('2d');
let osmRoads = [];   // wird von OSM befüllt

const MM = 160;
// Bounding Box der Route berechnen
const allX = WP.map(w=>w.x), allZ = WP.map(w=>w.z);
const mmMinX = Math.min(...allX)-80, mmMaxX = Math.max(...allX)+80;
const mmMinZ = Math.min(...allZ)-80, mmMaxZ = Math.max(...allZ)+80;

function toMM(wx, wz) {
  return [
    10 + (wx - mmMinX) / (mmMaxX - mmMinX) * (MM-20),
    10 + (wz - mmMinZ) / (mmMaxZ - mmMinZ) * (MM-20),
  ];
}

function drawMinimap() {
  mmCtx.clearRect(0,0,MM,MM);
  mmCtx.fillStyle = '#192219';
  mmCtx.fillRect(0,0,MM,MM);

  // OSM-Hintergrundstraßen
  mmCtx.strokeStyle = '#2a3a2a';
  mmCtx.lineWidth = 1;
  osmRoads.forEach(pts => {
    if (pts.length < 2) return;
    mmCtx.beginPath();
    pts.forEach(([ox,oz],i) => {
      const [px,py] = toMM(ox,oz);
      i===0 ? mmCtx.moveTo(px,py) : mmCtx.lineTo(px,py);
    });
    mmCtx.stroke();
  });

  // Hauptroute (grau)
  mmCtx.strokeStyle='#555'; mmCtx.lineWidth=2.5;
  mmCtx.beginPath();
  WP.forEach((wp,i)=>{const[px,py]=toMM(wp.x,wp.z); i===0?mmCtx.moveTo(px,py):mmCtx.lineTo(px,py);});
  mmCtx.stroke();

  // Zurückgelegte Strecke (blau)
  mmCtx.strokeStyle='#0af'; mmCtx.lineWidth=2;
  mmCtx.beginPath();
  WP.slice(0, car.wpIdx).forEach((wp,i)=>{const[px,py]=toMM(wp.x,wp.z); i===0?mmCtx.moveTo(px,py):mmCtx.lineTo(px,py);});
  const [cpx,cpy] = toMM(car.x, car.z);
  mmCtx.lineTo(cpx, cpy);
  mmCtx.stroke();

  // Wegpunkt-Dots
  WP.forEach((wp,i)=>{
    const[px,py]=toMM(wp.x,wp.z);
    mmCtx.beginPath(); mmCtx.arc(px,py,i<car.wpIdx?3.5:2,0,Math.PI*2);
    mmCtx.fillStyle = i<car.wpIdx ? '#0f8' : '#555';
    mmCtx.fill();
  });

  // Auto (roter Pfeil)
  const[ax,ay]=toMM(car.x,car.z);
  mmCtx.save();
  mmCtx.translate(ax,ay);
  mmCtx.rotate(car.heading);
  mmCtx.fillStyle='#ff3333';
  mmCtx.beginPath(); mmCtx.moveTo(0,-5.5); mmCtx.lineTo(-3.5,4); mmCtx.lineTo(3.5,4);
  mmCtx.closePath(); mmCtx.fill();
  mmCtx.restore();
}

// ── OSM-Daten laden (Overpass API) ───────────────────────────────────────────
async function loadOSM() {
  // Bounding box rund um unsere Route
  // Bounding box: deckt komplette Route von Bilderstöckchen bis Müngersdorf ab
  const bbox = '50.930,6.872,50.970,6.942';
  const q = `[out:json][timeout:30];(way["highway"~"^(primary|secondary|tertiary|residential|unclassified|living_street|service)$"](${bbox}););(._;>;);out body;`;
  const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`;

  try {
    const res  = await fetch(url);
    const data = await res.json();

    // Node-Lookup bauen
    const nodes = {};
    data.elements.filter(e=>e.type==='node').forEach(n=>{
      const pos = ll(n.lat, n.lon);
      nodes[n.id] = [pos.x, pos.z];
    });

    // Straßen in Szene rendern (als dünne Plane-Segmente)
    const osmMat = new THREE.MeshBasicMaterial({ color:0x1e2e1e });
    let roadCount = 0;

    data.elements.filter(e=>e.type==='way').forEach(way => {
      const pts = way.nodes.map(id=>nodes[id]).filter(Boolean);
      if (pts.length < 2) return;

      // Für Minimap speichern
      osmRoads.push(pts);

      // 3D-Geometrie (nur wenn nah genug an Route)
      for (let i = 0; i < pts.length-1; i++) {
        const [ax,az] = pts[i];
        const [bx,bz] = pts[i+1];
        const geo = roadGeo(ax,az,bx,bz, 5.5, 0.005);
        scene.add(new THREE.Mesh(geo, osmMat));
        roadCount++;
      }
    });

    document.getElementById('osm-lbl').textContent = `🗺 OSM ✓ (${roadCount} Segmente)`;
    setTimeout(() => document.getElementById('osm-lbl').style.opacity='0', 4000);
    console.log('OSM geladen:', roadCount, 'Straßensegmente');
  } catch(err) {
    console.warn('OSM nicht geladen:', err);
    document.getElementById('osm-lbl').textContent = '🗺 OSM (offline)';
    setTimeout(() => document.getElementById('osm-lbl').style.opacity='0', 3000);
  }
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Animation Loop ────────────────────────────────────────────────────────────
let lastT = performance.now();
const clock = new THREE.Clock();

function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  const elapsed = clock.getElapsedTime();

  updateCar(dt);
  updateCamera();
  updateTrafficLights(elapsed);
  drawMinimap();

  document.getElementById('spd').textContent = Math.round(car.speed * 3.6);
  renderer.render(scene, cam);
}

// ── Start ─────────────────────────────────────────────────────────────────────
toast('🚦 Start: Altbaumburgweg, Bilderstöckchen');
loadOSM();
requestAnimationFrame(loop);

} // Ende startSimulator()
</script>
</body>
</html>
