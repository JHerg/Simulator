<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Köln Fahrsimulator</title>
  <!-- Three.js wird per async/await geladen – korrekte Reihenfolge garantiert -->
  <style>
    #boot-screen{
      position:fixed;inset:0;z-index:9999;
      background:#001118;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:18px;
      color:#0af;font-family:Arial;font-size:16px;text-align:center;
    }
    #boot-bar{width:240px;height:6px;background:#0a1e2a;border-radius:3px;overflow:hidden;}
    #boot-bar-fill{height:100%;width:0%;background:#0af;transition:width .4s;}
    #boot-msg{color:#aaa;font-size:13px;}
    #boot-err{color:#f55;font-size:14px;display:none;max-width:420px;line-height:1.7;}
  </style>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;overflow:hidden;font-family:Arial,sans-serif;touch-action:none;}
    canvas{display:block;}

    /* ── Fortschrittsbalken ─────────────────────────── */
    #prog{position:fixed;top:0;left:0;right:0;height:5px;background:#111;z-index:50;}
    #prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#0af,#0f8);transition:width .3s;}

    /* ── Titel-Bar ──────────────────────────────────── */
    #info{
      position:fixed;top:12px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.75);color:#fff;padding:6px 18px;
      border-radius:20px;font-size:13px;white-space:nowrap;
      border:1px solid #444;z-index:40;pointer-events:none;
    }

    /* ── Toast (Straßenname) ────────────────────────── */
    #toast{
      position:fixed;top:52px;left:50%;transform:translateX(-50%);
      background:rgba(10,80,220,.85);color:#fff;padding:5px 16px;
      border-radius:14px;font-size:13px;opacity:0;
      transition:opacity .4s;z-index:40;pointer-events:none;
    }

    /* ── Tachometer ─────────────────────────────────── */
    #speedo{
      position:fixed;z-index:40;pointer-events:none;
      background:rgba(0,0,0,.82);border:2px solid #444;border-radius:50%;
      width:100px;height:100px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    #speedo .v{font-size:30px;font-weight:bold;color:#0af;line-height:1;}
    #speedo .u{font-size:11px;color:#777;}

    /* ── Minimap ─────────────────────────────────────── */
    #mm{
      position:fixed;
      background:rgba(0,0,0,.8);border:2px solid #333;
      border-radius:8px;overflow:hidden;z-index:40;
    }

    /* ── OSM-Status ─────────────────────────────────── */
    #osm-lbl{
      position:fixed;top:12px;right:14px;
      background:rgba(0,0,0,.7);color:#aaa;
      padding:4px 10px;border-radius:8px;font-size:11px;
      z-index:40;transition:opacity .5s;
    }

    /* ── Tastaturhilfe (Desktop) ────────────────────── */
    #hint{
      position:fixed;top:58px;right:14px;
      background:rgba(0,0,0,.65);color:#bbb;
      padding:9px 13px;border-radius:8px;font-size:12px;
      line-height:1.9;z-index:40;pointer-events:none;
    }

    /* ── Mobile Steuerung ────────────────────────────── */
    #mctrl{
      position:fixed;bottom:0;left:0;right:0;height:115px;
      display:none;z-index:45;pointer-events:none;
    }
    /* Zeige mobile Buttons auf Touch-Geräten oder kleinen Bildschirmen */
    @media(pointer:coarse),(max-width:700px){
      #mctrl{display:block;}
      #hint{display:none;}
      #speedo{bottom:auto;top:160px;right:14px;}
      #mm{bottom:auto;top:14px;left:14px;}
    }
    @media(pointer:fine){
      #speedo{bottom:125px;right:20px;}
      #mm{bottom:125px;left:20px;}
    }

    .mbtn{
      position:absolute;pointer-events:all;
      display:flex;align-items:center;justify-content:center;
      border-radius:14px;font-size:24px;font-weight:bold;
      border:2px solid rgba(255,255,255,.25);
      background:rgba(0,0,0,.55);color:#fff;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      user-select:none;transition:background .1s;
    }
    .mbtn.on{background:rgba(50,100,255,.65);}
    #bl{bottom:20px;left:12px;width:68px;height:68px;}
    #br{bottom:20px;left:90px;width:68px;height:68px;}
    #bgas{bottom:20px;right:12px;width:88px;height:68px;background:rgba(0,120,0,.6);}
    #bbrk{bottom:20px;right:110px;width:68px;height:68px;background:rgba(160,0,0,.5);}
    /* ── Desktop: Speedo + Minimap immer sichtbar ──── */
    #speedo{ bottom:20px; right:20px; }
    #mm    { bottom:20px; left:20px;  }

    /* ── Fehler-Box ────────────────────────────────── */
    #err-box{
      display:none;position:fixed;inset:0;z-index:9999;
      background:rgba(0,0,0,.95);
      align-items:center;justify-content:center;flex-direction:column;
      color:#ff5555;text-align:center;padding:30px;font-size:15px;
    }
    #err-box h2{font-size:28px;margin-bottom:16px;}
    #err-box pre{background:#111;color:#f88;padding:12px;border-radius:8px;
      font-size:11px;text-align:left;max-width:600px;overflow:auto;margin-top:12px;}
    #err-solution{background:#1a2a1a;color:#8f8;padding:12px 20px;
      border-radius:8px;margin-top:14px;font-size:13px;line-height:1.8;}

    /* ── Navigations-Panel (Turn-by-Turn) ────────────────────────────── */
    #nav-panel{
      position:fixed;top:14px;left:14px;
      background:#1a237e;color:#fff;
      border-radius:12px;border:2px solid rgba(255,255,255,.55);
      z-index:40;pointer-events:none;overflow:hidden;
      min-width:145px;
      box-shadow:0 3px 18px rgba(0,0,60,.75);
    }
    #nav-dist{
      font-size:21px;font-weight:bold;text-align:center;
      padding:8px 14px 4px;background:#0d47a1;
      letter-spacing:.4px;
    }
    #nav-arrow-wrap{
      text-align:center;padding:4px 0 7px;
      background:#283593;
    }
    #nav-arrow{font-size:50px;line-height:1.05;}
    #nav-next{
      font-size:11.5px;font-weight:bold;text-align:center;
      padding:5px 10px 7px;background:#0d47a1;
      color:#90caf9;border-top:1px solid #1a237e;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      max-width:158px;
    }
    @media(pointer:coarse),(max-width:700px){
      #nav-panel{
        top:14px; right:14px;
        bottom:auto; left:auto;
        transform:none;
        min-width:145px;
      }
    }

    /* ── Konfigurations-Bildschirm ─────────────────────── */
    #cfg-screen{
      position:fixed;inset:0;z-index:9998;
      background:linear-gradient(160deg,#000e1c 0%,#001e30 60%,#000a18 100%);
      display:none;flex-direction:column;
      align-items:center;justify-content:center;gap:26px;
      color:#fff;font-family:Arial,sans-serif;
    }
    .cfg-title{font-size:34px;font-weight:bold;letter-spacing:1px;}
    .cfg-sub{font-size:13px;color:#7aaac8;margin-top:-18px;}
    .cfg-block{display:flex;flex-direction:column;align-items:center;gap:10px;}
    .cfg-lbl{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#778899;}
    .cfg-row{display:flex;gap:12px;}
    .cfg-btn{
      padding:13px 30px;border-radius:12px;font-size:15px;
      border:2px solid rgba(255,255,255,.22);background:rgba(255,255,255,.07);
      color:#ddd;cursor:pointer;transition:all .18s;
    }
    .cfg-btn:hover{background:rgba(255,255,255,.17);color:#fff;}
    .cfg-btn.sel{
      background:rgba(0,110,255,.5);border-color:rgba(100,170,255,.85);
      color:#fff;box-shadow:0 0 14px rgba(0,120,255,.4);
    }
    #cfg-start{
      margin-top:6px;padding:15px 54px;border-radius:14px;
      font-size:20px;font-weight:bold;
      background:linear-gradient(135deg,#0044cc,#0080ff);
      border:2px solid rgba(100,180,255,.55);color:#fff;cursor:pointer;
      box-shadow:0 4px 22px rgba(0,100,255,.45);
      transition:transform .15s,box-shadow .15s;
    }
    #cfg-start:hover{transform:translateY(-2px);box-shadow:0 7px 28px rgba(0,130,255,.6);}

    /* ── Tempolimit-Schild ──────────────────────────────── */
    #limit-sign{
      position:fixed;z-index:40;pointer-events:none;
      width:62px;height:62px;border-radius:50%;
      border:6px solid #cc1111;background:#fff;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 10px rgba(0,0,0,.45);
    }
    #limit-val{font-size:22px;font-weight:bold;color:#111;line-height:1;}
    /* Desktop: links neben Tacho (Tacho bottom:20px right:20px, 100px breit) */
    @media(pointer:fine){
      #limit-sign{bottom:28px;right:130px;}
    }
    /* Mobil: unter Tacho (Tacho top:160px, 100px hoch → 160+100+12=272) */
    @media(pointer:coarse),(max-width:700px){
      #limit-sign{top:272px;right:14px;}
    }
  </style>
</head>
<body>

<!-- Boot-Screen -->
<div id="boot-screen">
  <div style="font-size:36px">🚗</div>
  <div style="font-size:20px;color:#fff;font-weight:bold">Köln Fahrsimulator</div>
  <div id="boot-bar"><div id="boot-bar-fill"></div></div>
  <div id="boot-msg">Starte…</div>
  <div id="boot-err"></div>
</div>

<!-- Konfigurations-Bildschirm (erscheint nach Three.js-Ladevorgang) -->
<div id="cfg-screen">
  <div class="cfg-title">🚗 Köln Fahrsimulator</div>

  <div class="cfg-block">

      <button class="cfg-btn sel" data-group="time" data-val="day">☀️ Tag</button>

</div>

<div id="prog"><div id="prog-fill"></div></div>
<canvas id="canvas" style="width:100vw;height:100vh;display:block;"></canvas>

<div id="info">🚗 Köln · Altbaumburgweg → RheinEnergie Stadion</div>
<div id="toast"></div>
<div id="speedo"><div class="v" id="spd">0</div><div class="u">km/h</div></div>
<div id="mm"><canvas id="mm-cv" width="160" height="160" style="display:block;"></canvas></div>
<div id="osm-lbl">🗺 Lade OSM…</div>
<!-- Aktuelle Straße (Daueranzeige wie Navigation) -->
<div id="street-lbl" style="
  position:fixed;bottom:130px;left:50%;transform:translateX(-50%);
  background:#003399;color:#fff;padding:5px 22px 5px 14px;
  border-radius:4px;font-size:15px;font-weight:bold;z-index:40;
  white-space:nowrap;pointer-events:none;
  box-shadow:0 2px 8px rgba(0,0,40,.5);
  border:2px solid #fff;
">Altbaumburgweg</div>

  <div class="mbtn" id="bl">◀</div>
  <div class="mbtn" id="br">▶</div>

  <div class="mbtn" id="bbrk">⛔</div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  KÖLN FAHRSIMULATOR v2 – Async Boot-Loader
// ════════════════════════════════════════════════════════════════════════════

// Three.js dynamisch laden (async/await – korrekte Reihenfolge garantiert)
function loadScript(url) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = url;
    s.onload  = resolve;
    s.onerror = function() { reject(new Error('Konnte nicht laden: ' + url)); };
    document.head.appendChild(s);
  });
}

function bootMsg(text, pct) {
  document.getElementById('boot-msg').textContent = text;
  if (pct !== undefined)
    document.getElementById('boot-bar-fill').style.width = pct + '%';
}

function bootError(text) {
  document.getElementById('boot-err').style.display = 'block';
  document.getElementById('boot-err').innerHTML =
    '<strong>❌ ' + text + '</strong><br><br>' +
    'Öffne diese Seite über:<br>' +
    '<strong>https://jherg.github.io/Simulator/</strong><br>' +
    '<small>(GitHub Pages → immer verfügbar)</small>';
  document.getElementById('boot-msg').textContent = '';
}

async function boot() {
  const CDNs = [
    'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js',
    'https://unpkg.com/three@0.158.0/build/three.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js',
  ];

  let loaded = false;
  for (let i = 0; i < CDNs.length; i++) {
    const cdn = CDNs[i];
    bootMsg('Lade Three.js (' + cdn.split('/')[2] + ')…', 20 + i * 25);
    try {
      await loadScript(cdn);
      if (typeof THREE !== 'undefined') { loaded = true; break; }
    } catch(e) {
      console.warn('CDN fehlgeschlagen:', cdn);
    }
  }

  if (!loaded) {
    bootError('Three.js konnte von keinem CDN geladen werden.');
    return;
  }

  bootMsg('Bereit…', 95);
  await new Promise(r => setTimeout(r, 40));

  // Three.js geladen → Konfigurations-Bildschirm zeigen
  document.getElementById('boot-screen').style.display = 'none';
  const cfgEl = document.getElementById('cfg-screen');
  cfgEl.style.display = 'flex';

  // Optionen-Buttons (Toggle innerhalb Gruppe)
  cfgEl.querySelectorAll('.cfg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      cfgEl.querySelectorAll(`.cfg-btn[data-group="${btn.dataset.group}"]`)
        .forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
    });
  });

  // Start-Button
  document.getElementById('cfg-start').addEventListener('click', () => {
    const cfg = {
      time:    cfgEl.querySelector('.cfg-btn[data-group="time"].sel')?.dataset.val    || 'day',
      weather: cfgEl.querySelector('.cfg-btn[data-group="weather"].sel')?.dataset.val || 'clear',
    };
    cfgEl.style.display = 'none';
    try {
      startSimulator(cfg);
    } catch(e) {
      bootError('Render-Fehler: ' + e.message);
      document.getElementById('boot-screen').style.display = 'flex';
      console.error(e);
    }
  });
}

boot();

function startSimulator(cfg) {
cfg = cfg || { time:'day', weather:'clear' };

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)
              || window.innerWidth < 700;

// ── Geo-Koordinaten → Szene (Meter) ─────────────────────────────────────────
// Referenzpunkt: Altbaumburgweg 2, 50739 Köln (exakt laut Routenplaner)
const LAT0 = 50.9674, LNG0 = 6.9382;
const mLat = 111320;
const mLng = mLat * Math.cos(LAT0 * Math.PI / 180);   // ≈ 70 030 m/°

function ll(lat, lng){ return { x:(lng-LNG0)*mLng, z:(LAT0-lat)*mLat }; }

// ══════════════════════════════════════════════════════════════════════════
//  ROUTE: Altbaumburgweg 2 (50739) → RheinEnergieSTADION  –  8,7 km
//  Quell-Koordinaten direkt vom Routenplaner des Nutzers
// ══════════════════════════════════════════════════════════════════════════
// ── Routen-Geometrie ──────────────────────────────────────────────────────────
// Alle Koordinaten aus exakten Szenen-Positionen berechnet:
//   x = 0  → Startpunkt (Altbaumburgweg, reine Südrichtung)
//   Jeder WP-Abstand entspricht der Navigationslänge der Straße.
//   Abbiegungen: Rechtskurve = heading sinkt (→ Westen),
//                Linkskurve  = heading steigt (→ Osten).
//   Szene → GPS:  lat = LAT0 − z/mLat   |   lng = LNG0 + x/mLng
const WP = [

  // ── 1. Altbaumburgweg  (6 m, 55 m südwärts) ──────────────────────────
  //   Startpunkt (0, 0)
  { street:"Altbaumburgweg",            ...ll(50.96740,6.93820), tl:false, width:6  },
  //   (0, 55) → 55 m Süd
  { street:"Altbaumburgweg",            ...ll(50.96691,6.93820), tl:false, width:6  },

  // ── 2. Trifelsstraße  (6 m, 187 m westwärts, RECHTS) ─────────────────
  //   (−93, 55) Mittelpunkt
  { street:"Trifelsstraße",             ...ll(50.96691,6.93687), tl:false, width:6  },
  //   (−187, 55) → 187 m West
  { street:"Trifelsstraße",             ...ll(50.96691,6.93553), tl:false, width:6  },

  // ── 3. Ebernburgweg  (6 m, 288 m südwärts, LINKS) ────────────────────
  //   (−187, 199) Mittelpunkt
  { street:"Ebernburgweg",              ...ll(50.96561,6.93553), tl:false, width:6  },
  //   (−187, 343) → 288 m Süd
  { street:"Ebernburgweg",              ...ll(50.96432,6.93553), tl:false, width:6  },

  // ── 4. Schiefersburger Weg  (7 m, 239 m westwärts, RECHTS) ──────────
  //   (−307, 343) Mittelpunkt
  { street:"Schiefersburger Weg",       ...ll(50.96432,6.93382), tl:false, width:7  },
  //   (−426, 343) → 239 m West
  { street:"Schiefersburger Weg",       ...ll(50.96432,6.93212), tl:false, width:7  },

  // ── 5. Escher Str.  (9 m, 666 m südwärts, 2. Ausfahrt KV) ──────────
  //   (−426, 510)
  { street:"Escher Str.",               ...ll(50.96282,6.93212), tl:false, width:9  },
  //   (−426, 677)
  { street:"Escher Str.",               ...ll(50.96132,6.93212), tl:false, width:9  },
  //   (−426, 843) Ampel
  { street:"Escher Str.",               ...ll(50.95983,6.93212), tl:true,  width:9  },
  //   (−426, 1009) → 666 m Süd
  { street:"Escher Str.",               ...ll(50.95834,6.93212), tl:false, width:9  },

  // ── 6. Parkgürtel  (12 m, 647 m westwärts, RECHTS auffahren) ─────────
  //   (−749, 1009) Mittelpunkt
  { street:"Parkgürtel",                ...ll(50.95834,6.92751), tl:false, width:12 },
  //   (−1073, 1009) → 647 m West
  { street:"Parkgürtel",                ...ll(50.95834,6.92289), tl:false, width:12 },

  // ── 7. Auffahrt Richtung Zentrum / K4  (10 m, 357 m südwärts, LINKS) ─
  //   (−1073, 1187)
  { street:"Auffahrt Richtung Zentrum", ...ll(50.95674,6.92289), tl:false, width:10 },
  //   (−1073, 1366) → 357 m Süd
  { street:"Auffahrt Richtung Zentrum", ...ll(50.95513,6.92289), tl:false, width:10 },

  // ── 8. Innere Kanalstraße / K4  (14 m, 2.462 m südwärts) ─────────────
  //   (−1073, 1958)
  { street:"Innere Kanalstraße",        ...ll(50.94981,6.92289), tl:false, width:14 },
  //   (−1073, 2450) Ampel
  { street:"Innere Kanalstraße",        ...ll(50.94539,6.92289), tl:true,  width:14 },
  //   (−1073, 2942)
  { street:"Innere Kanalstraße",        ...ll(50.94097,6.92289), tl:false, width:14 },
  //   (−1073, 3434) Ampel
  { street:"Innere Kanalstraße",        ...ll(50.93655,6.92289), tl:true,  width:14 },
  //   (−1073, 3828) → 2.462 m Süd
  { street:"Innere Kanalstraße",        ...ll(50.93300,6.92289), tl:false, width:14 },

  // ── 9. Aachener Str. B55  (18 m, 1.708 m westwärts, RECHTS) ──────────
  //   (−1500, 3828)
  { street:"Aachener Str.",             ...ll(50.93300,6.91680), tl:false, width:18 },
  //   (−1927, 3828) Ampel
  { street:"Aachener Str.",             ...ll(50.93300,6.91071), tl:true,  width:18 },
  //   (−2354, 3828)
  { street:"Aachener Str.",             ...ll(50.93300,6.90462), tl:false, width:18 },
  //   (−2781, 3828) → 1.708 m West
  { street:"Aachener Str.",             ...ll(50.93300,6.89852), tl:true,  width:18 },

  // ── 10. Kitschburger Str.  (8 m, 330 m südwärts, LINKS) ───────────────
  //   (−2781, 3993)
  { street:"Kitschburger Str.",         ...ll(50.93152,6.89852), tl:false, width:8  },
  //   (−2781, 4158) → 330 m Süd
  { street:"Kitschburger Str.",         ...ll(50.93004,6.89852), tl:false, width:8  },

  // ── 11. Friedrich-Schmidt-Str.  (10 m, 1.023 m westwärts, RECHTS KV) ─
  //   (−3122, 4158)
  { street:"Friedrich-Schmidt-Str.",    ...ll(50.93004,6.89366), tl:false, width:10 },
  //   (−3463, 4158)

// ── Hilfsfunktion: Straßensegment-Geometrie (vertex-basiert, kein lookAt) ────
function roadGeo(ax, az, bx, bz, width, y) {
  const dx = bx - ax, dz = bz - az;
  const len = Math.hypot(dx, dz);
  const nx = -dz / len, nz = dx / len; // Normale (senkrecht zur Fahrtrichtung)
  const hw = width / 2;
  const geo = new THREE.BufferGeometry();
  // 4 Ecken: AL, AR, BR, BL
  geo.setAttribute('position', new THREE.Float32BufferAttribute([
    ax - nx*hw, y, az - nz*hw,
    ax + nx*hw, y, az + nz*hw,
    bx + nx*hw, y, bz + nz*hw,
    bx - nx*hw, y, bz - nz*hw,
  ], 3));
  geo.setIndex([0,1,2, 0,2,3]);
  geo.computeVertexNormals();
  return geo;
}

// ── Hauptroute aufbauen ───────────────────────────────────────────────────────
(function buildRoute() {
  const asphalt   = new THREE.MeshLambertMaterial({ color: 0x2e2e2e });
  const sidewalk  = new THREE.MeshLambertMaterial({ color: 0xb8a898 });
  const dashMat   = new THREE.MeshBasicMaterial({ color: 0xeeeecc });

  for (let i = 0; i < WP.length - 1; i++) {
    const A = WP[i], B = WP[i+1];
    const rw = A.width || 8; // Straßenbreite aus WP oder Standard 8m

    // Asphalt
    scene.add(new THREE.Mesh(roadGeo(A.x,A.z,B.x,B.z, rw, 0.01), asphalt));
    // Gehwege (1.5m Bürgersteig je Seite)
    scene.add(new THREE.Mesh(roadGeo(A.x,A.z,B.x,B.z, rw+3, 0.005), sidewalk));

    // Mittellinien (gestrichelt durch kurze Segmente)
    const segLen = Math.hypot(B.x-A.x, B.z-A.z);
    const steps  = Math.floor(segLen / 10);
    for (let s = 0; s < steps; s++) {
      const t0 = (s + 0.1) / steps;
      const t1 = (s + 0.6) / steps;
      const x0 = A.x + (B.x-A.x)*t0, z0 = A.z + (B.z-A.z)*t0;
      const x1 = A.x + (B.x-A.x)*t1, z1 = A.z + (B.z-A.z)*t1;
      scene.add(new THREE.Mesh(roadGeo(x0,z0,x1,z1, 0.2, 0.02), dashMat));
    }
  }
})();

(function makeStreetSigns() {
  const postMat = new THREE.MeshLambertMaterial({ color: 0x999999 });
  let prevStreet = '';

  for (let i = 1; i < WP.length; i++) {
    const wp   = WP[i];
    const prev = WP[i - 1];
    if (wp.street === prevStreet) continue;
    prevStreet = wp.street;

    // Richtungsvektor des Segments
    const dx = wp.x - prev.x, dz = wp.z - prev.z;
    const len = Math.hypot(dx, dz);
    if (len < 1) continue;
    const nx = -dz / len, nz = dx / len; // Senkrecht links

    // Canvas-Textur (deutsches Straßenschild, blau)
    const cv = document.createElement('canvas');
    cv.width = 400; cv.height = 80;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#002288';
    ctx.fillRect(0, 0, 400, 80);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 4;
    ctx.strokeRect(4, 4, 392, 72);
    ctx.fillStyle = '#ffffff';
    const label = wp.street.replace(' 🏟', '');
    const fs = label.length > 18 ? 22 : 28;
    ctx.font = `bold ${fs}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 200, 42);
    const tex = new THREE.CanvasTexture(cv);

    // Schild rechts der Fahrtrichtung
    const sx = wp.x - nx * 7;
    const sz = wp.z - nz * 7;

    // Mast
    const post = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.07, 4, 6), postMat
    );
    post.position.set(sx, 2, sz);

    // Schildfläche (DoubleSide → von beiden Seiten lesbar)
    const mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, side: THREE.DoubleSide
    });
    const sign = new THREE.Mesh(new THREE.PlaneGeometry(5, 1), mat);
    sign.position.set(sx, 4.5, sz);
    sign.rotation.y = Math.atan2(dx, dz) + Math.PI / 2; // senkrecht zur Straße

  }
})();

(function buildTrees() {
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b3f1e });
  const crownMats = [
    new THREE.MeshLambertMaterial({ color: 0x2d7a2d }),
    new THREE.MeshLambertMaterial({ color: 0x1e6b1e }),
    new THREE.MeshLambertMaterial({ color: 0x3a8a28 }),
  ];
  const rng = (() => { let s=9876543; return ()=>{ s=(s*1664525+1013904223)&0x7fffffff; return s/0x7fffffff; }; })();
  const treeSpacing = isMobile ? 25 : 14;

  for (let i = 0; i < WP.length-1; i++) {
    const A = WP[i], B = WP[i+1];
    const dx = B.x-A.x, dz = B.z-A.z;
    const len = Math.hypot(dx, dz);
    const ux = dx/len, uz = dz/len;
    const nx = -uz, nz = ux;
    const count = Math.floor(len / treeSpacing);

    for (let k = 0; k < count; k++) {
      const t = k / count;
      if (t < 0.1 || t > 0.9) continue;  // Kreuzungsbereich freihalten
      const bx = A.x + dx*t, bz = A.z + dz*t;

      [-1,1].forEach(side => {
        if (rng() > 0.6) return;
        const roadHW = (WP[i].width || 8) / 2;
        const off = roadHW + 1.6 + rng() * 3;
        const px = bx + nx*side*off;
        const pz = bz + nz*side*off;
        const h  = 4 + rng()*4;
        const cr = 1.4 + rng()*1.6;

        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.18,h,6), trunkMat);
        trunk.position.set(px, h/2, pz);
        scene.add(trunk);

        const crown = new THREE.Mesh(
          new THREE.SphereGeometry(cr, isMobile?5:8, isMobile?5:8),
          crownMats[Math.floor(rng()*crownMats.length)]
        );
        crown.position.set(px, h + cr*0.55, pz);
        if (!isMobile) crown.castShadow = true;
        scene.add(crown);
      });
    }
  }
})();

const trafficLights = [];

function makeTrafficLight(x, z, facing) {
  const g = new THREE.Group();
  // Mast
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08,0.09,5,8),
    new THREE.MeshLambertMaterial({ color:0x222222 })
  );
  pole.position.y = 2.5;
  g.add(pole);

  // Gehäuse
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(0.45,1.5,0.3),
    new THREE.MeshLambertMaterial({ color:0x111111 })
  );
  box.position.set(0, 5.25, 0);
  g.add(box);

  // Drei Lichter: [0]=rot [1]=gelb [2]=grün
  const yOff = [0.52, 0, -0.52];
  const onColors  = [0xff2200, 0xffaa00, 0x00dd00];
  const bulbs = yOff.map((yo, idx) => {
    const m = new THREE.Mesh(
      new THREE.CircleGeometry(0.14, 8),
      new THREE.MeshBasicMaterial({ color: 0x111111 })
    );
    m.position.set(0, 5.25+yo, 0.16);
    m.userData.on  = onColors[idx];
    m.userData.off = 0x111111;
    g.add(m);
    return m;
  });

  g.position.set(x, 0, z);
  if (facing !== undefined) g.rotation.y = facing;
  g.userData.bulbs = bulbs;
  g.userData.phase = Math.random() * 15;  // gestaffelte Phasen
  scene.add(g);
  trafficLights.push(g);
}

// Ampeln an markierten Wegpunkten (beidseitig)
WP.forEach((wp, i) => {
  if (!wp.tl || i === 0 || i >= WP.length-1) return;
  const prev = WP[i-1];
  const dx = wp.x - prev.x, dz = wp.z - prev.z;
  const len = Math.hypot(dx, dz);
  const nx = -dz/len, nz = dx/len;
  const facing = Math.atan2(dx, dz);

  makeTrafficLight(wp.x + nx* 6, wp.z + nz* 6, facing);
  makeTrafficLight(wp.x - nx* 6, wp.z - nz* 6, facing + Math.PI);
});

function updateTrafficLights(t) {
  trafficLights.forEach(tl => {
    const cycle = (t + tl.userData.phase) % 14;  // 14-Sekunden-Zyklus
    // 0–6s grün, 6–8s gelb, 8–14s rot
    let state; // 2=grün 1=gelb 0=rot
    if      (cycle < 6)  state = 2;
    else if (cycle < 8)  state = 1;
    else                 state = 0;

    tl.userData.bulbs.forEach((b, i) => {
      b.material.color.setHex(i === state ? b.userData.on : b.userData.off);
    });
    tl.userData.isRed = (state === 0);
  });
}

const NPC_COLORS = [0xcc3322,0x228833,0xddcc11,0xffffff,0x2255cc,0xdd7722,0x882288];
const npcs = [];

function createNPC(wpStart, color) {
  const g   = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color });
  const blk = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const gls = new THREE.MeshBasicMaterial({ color: 0x223344 });

  // Karosserie
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.1, 4.0), mat);
  body.position.y = 0.75; g.add(body);
  // Dach
  const roof = new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.7, 2.1), mat);
  roof.position.set(0, 1.6, -0.25); g.add(roof);
  // Frontscheibe
  const ws = new THREE.Mesh(new THREE.PlaneGeometry(1.3, 0.6), gls);
  ws.position.set(0, 1.55, 0.8); ws.rotation.x = -0.28; g.add(ws);
  // Heckscheibe
  const rw = new THREE.Mesh(new THREE.PlaneGeometry(1.3, 0.55), gls);
  rw.position.set(0, 1.57, -1.3); rw.rotation.set(0.28, Math.PI, 0); g.add(rw);
  // Räder (4 Stück)
  [[-0.88,0.3,1.2],[0.88,0.3,1.2],[-0.88,0.3,-1.2],[0.88,0.3,-1.2]].forEach(([rx,ry,rz])=>{
    const w = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.22,12), blk);
    w.rotation.z = Math.PI/2; w.position.set(rx,ry,rz); g.add(w);
  });

  scene.add(g);
  const wp = WP[wpStart];
  const wpN = WP[Math.min(wpStart+1, WP.length-1)];
  return {
    mesh: g,
    x: wp.x, z: wp.z,
    heading: Math.atan2(wpN.x - wp.x, wpN.z - wp.z),
    speed: 7.5 + Math.random() * 4,  // 27–42 km/h
    wpIdx: wpStart + 1,
  };
}

function initNPCs() {
  const step = Math.floor(WP.length / 8);
  for (let i = 0; i < 7; i++) {
    const idx = Math.min(1 + step * (i + 1), WP.length - 3);
    npcs.push(createNPC(idx, NPC_COLORS[i % NPC_COLORS.length]));
  }
}

function updateNPCs(dt) {
  npcs.forEach(npc => {
    if (npc.wpIdx >= WP.length) {
      npc.wpIdx = 1; npc.x = WP[0].x; npc.z = WP[0].z;
      npc.heading = Math.atan2(WP[1].x-WP[0].x, WP[1].z-WP[0].z);
      return;
    }
    const tgt = WP[npc.wpIdx];
    const dx = tgt.x - npc.x, dz = tgt.z - npc.z;
    if (Math.hypot(dx, dz) < 18) { npc.wpIdx++; return; }
    // Sanftes Nachlenken
    let diff = Math.atan2(dx, dz) - npc.heading;
    diff = ((diff + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
    npc.heading += diff * Math.min(1, 2.8 * dt);
    npc.x += Math.sin(npc.heading) * npc.speed * dt;
    npc.z += Math.cos(npc.heading) * npc.speed * dt;
    npc.mesh.position.set(npc.x, 0, npc.z);
    npc.mesh.rotation.y = npc.heading + Math.PI;
  });
}

  const el = document.getElementById(id);

      const prv = WP[car.wpIdx - 1];
      if (cur.street !== prv.street) {
        toast('🛣 ' + cur.street);
        document.getElementById('street-lbl').textContent = cur.street;
      }
    }
    if (car.wpIdx >= WP.length)
      setTimeout(() => toast('🏟 Ziel erreicht! RheinEnergie Stadion'), 600);
  }
}

// ── Navigations-HUD (Turn-by-Turn) ───────────────────────────────────────────
function updateNavHUD() {
  if (car.wpIdx >= WP.length) return;

  const distEl  = document.getElementById('nav-dist');
  const arrowEl = document.getElementById('nav-arrow');
  const nextEl  = document.getElementById('nav-next');

  // Nächste Kreuzung (Straßenwechsel) finden
  let jIdx = -1;
  for (let i = car.wpIdx; i < WP.length - 1; i++) {
    if (WP[i].street !== WP[i+1].street) { jIdx = i; break; }
  }

  if (jIdx === -1) {
    // Keine Abbiegung mehr – Ziel anfahren
    const dst = WP[WP.length-1];
    const d = Math.hypot(dst.x - car.x, dst.z - car.z);
    distEl.textContent  = d < 1000 ? Math.round(d) + ' m' : (d/1000).toFixed(1) + ' km';
    arrowEl.textContent = '🏟';
    nextEl.textContent  = 'RheinEnergie Stadion';
    return;
  }

  // Pfad-Distanz bis zur Kreuzung (WP-Kette)
  let dist = Math.hypot(WP[car.wpIdx].x - car.x, WP[car.wpIdx].z - car.z);
  for (let i = car.wpIdx; i < jIdx; i++)
    dist += Math.hypot(WP[i+1].x - WP[i].x, WP[i+1].z - WP[i].z);

  // Abbiegungsrichtung aus Kreuzprodukt bestimmen
  // (In diesem Koord.-System z=Süd: cross>0 = Rechtskurve, cross<0 = Linkskurve)
  let arrow = '⬆';
  if (jIdx >= 1 && jIdx + 1 < WP.length) {
    const ax = WP[jIdx].x   - WP[jIdx-1].x, az = WP[jIdx].z   - WP[jIdx-1].z;
    const bx = WP[jIdx+1].x - WP[jIdx].x,   bz = WP[jIdx+1].z - WP[jIdx].z;
    const cross = (ax * bz - az * bx) /
                  (Math.hypot(ax,az) * Math.hypot(bx,bz) + 1e-9);
    if      (cross >  0.15) arrow = '↱';  // Rechtskurve
    else if (cross < -0.15) arrow = '↰';  // Linkskurve
  }

  distEl.textContent  = dist < 1000 ? Math.round(dist) + ' m' : (dist/1000).toFixed(1) + ' km';
  arrowEl.textContent = arrow;
  nextEl.textContent  = WP[jIdx+1].name || WP[jIdx+1].street || '—';
}

// ── Engine Sound – Noise-Engine (Web Audio API) ───────────────────────────────
// Weißes Rauschen → Bandpass-Filter (Frequenz folgt RPM) + Sub-Bass-Sinus
// Klingt erheblich organischer als reine Oszillatoren.
let _actx = null, _noise = null, _engFilt = null, _engGain = null;
let _subOsc = null, _subGain = null, _lfoOsc = null, _lfoMod = null;

function initAudio() {
  if (_actx) return;
  try {
    _actx = new (window.AudioContext || window.webkitAudioContext)();
    const sr = _actx.sampleRate;

    // 2-Sekunden Weißrauschen-Buffer (loopend)
    const buf = _actx.createBuffer(1, sr * 2, sr);
    const ch  = buf.getChannelData(0);
    for (let i = 0; i < ch.length; i++) ch[i] = Math.random() * 2 - 1;
    _noise = _actx.createBufferSource();
    _noise.buffer = buf;
    _noise.loop   = true;
    _noise.start();

    // Bandpass – Mittenfrequenz = RPM-Grundfrequenz
    _engFilt = _actx.createBiquadFilter();
    _engFilt.type = 'bandpass';
    _engFilt.frequency.value = 80;
    _engFilt.Q.value = 6;

    // Master-Gain
    _engGain = _actx.createGain();
    _engGain.gain.value = 0.18;

    _noise.connect(_engFilt);
    _engFilt.connect(_engGain);
    _engGain.connect(_actx.destination);

    // Sub-Bass-Sinus (Körper/Wummern)
    _subOsc  = _actx.createOscillator();
    _subOsc.type = 'sine';
    _subOsc.frequency.value = 40;
    _subGain = _actx.createGain();
    _subGain.gain.value = 0.06;
    _subOsc.connect(_subGain);
    _subGain.connect(_actx.destination);
    _subOsc.start();

    // LFO – simuliert Zündimpulse (Amplitudenmodulation des Rauschens)
    _lfoOsc = _actx.createOscillator();
    _lfoOsc.type = 'sine';
    _lfoOsc.frequency.value = 22;
    _lfoMod = _actx.createGain();
    _lfoMod.gain.value = 0.06;   // sanfte Modulation, bleibt immer positiv
    _lfoOsc.connect(_lfoMod);
    _lfoMod.connect(_engGain.gain);
    _lfoOsc.start();
  } catch(e) {
    console.warn('Web Audio:', e);
  }
}

function updateEngineSound() {
  if (!_actx || _actx.state === 'suspended') return;
  const spd = Math.min(car.speed / MAX_SPD, 1);
  const now = _actx.currentTime;
  const hz  = 62 + spd * 128;  // 62 Hz Leerlauf → 190 Hz Vollgas

  _engFilt.frequency.setTargetAtTime(hz,          now, 0.08);
  _engGain.gain.setTargetAtTime(0.14 + spd * 0.11, now, 0.07);
  _lfoOsc.frequency.setTargetAtTime(hz * 2,        now, 0.07);
  _lfoMod.gain.setTargetAtTime(0.04 + spd * 0.07,  now, 0.08);
  _subOsc.frequency.setTargetAtTime(hz * 0.5,      now, 0.10);
  _subGain.gain.setTargetAtTime(0.04 + spd * 0.08, now, 0.09);
}

// ── GPS-Sprachausgabe (Web Speech API, Deutsch) ───────────────────────────────
const _voiceDone = new Set();  // "jIdx:far" / "jIdx:near" bereits angesagt

function _speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.92; u.pitch = 1.0;
  window.speechSynthesis.cancel();  // laufende Ansage abbrechen
  window.speechSynthesis.speak(u);
}

function updateVoice() {
  if (car.wpIdx >= WP.length) return;
  // Nächste Kreuzung suchen
  let jIdx = -1;
  for (let i = car.wpIdx; i < WP.length - 1; i++) {
    if (WP[i].street !== WP[i+1].street) { jIdx = i; break; }
  }
  if (jIdx === -1) return;

  // Distanz bis zur Kreuzung
  let dist = Math.hypot(WP[car.wpIdx].x - car.x, WP[car.wpIdx].z - car.z);
  for (let i = car.wpIdx; i < jIdx; i++)
    dist += Math.hypot(WP[i+1].x - WP[i].x, WP[i+1].z - WP[i].z);

  // Abbiegungsrichtung
  const ax = WP[jIdx].x   - WP[Math.max(jIdx-1,0)].x;
  const az = WP[jIdx].z   - WP[Math.max(jIdx-1,0)].z;
  const bx = WP[jIdx+1].x - WP[jIdx].x;
  const bz = WP[jIdx+1].z - WP[jIdx].z;
  const cross = (ax*bz - az*bx) / (Math.hypot(ax,az)*Math.hypot(bx,bz)+1e-9);
  const dir = cross > 0.15 ? 'rechts' : cross < -0.15 ? 'links' : 'geradeaus';
  const next = WP[jIdx+1].name || WP[jIdx+1].street;

  if (dist < 330 && dist > 260 && !_voiceDone.has(jIdx+':far')) {
    _voiceDone.add(jIdx+':far');
    _speak(`In ${Math.round(dist/50)*50} Metern ${dir} abbiegen auf ${next}`);
  } else if (dist < 90 && dist > 25 && !_voiceDone.has(jIdx+':near')) {
    _voiceDone.add(jIdx+':near');
    _speak(`Jetzt ${dir} abbiegen`);
  }
}

let rainData = null;
const nightLightPool = [];
let headlightL = null, headlightR = null, headlightTgtL = null, headlightTgtR = null;
let _shakeAmt = 0;

function applyNightMode() {

function buildStreetLamps() {
  const postMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xffdd88 });
  const spacing = 36;
  for (let i = 0; i < WP.length - 1; i++) {
    const A = WP[i], B = WP[i+1];
    const dx = B.x-A.x, dz = B.z-A.z;
    const len = Math.hypot(dx, dz);
    const nx = -dz/len, nz = dx/len;
    const steps = Math.max(1, Math.floor(len / spacing));
    for (let k = 0; k < steps; k++) {
      const t = (k + 0.5) / steps;
      const bx = A.x + dx*t, bz = A.z + dz*t;
      const off = (A.width || 8) / 2 + 2;
      [1, -1].forEach(side => {
        const px = bx + nx*side*off, pz = bz + nz*side*off;
        const post = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.07,5,6), postMat);
        post.position.set(px, 2.5, pz); scene.add(post);
        const glow = new THREE.Mesh(new THREE.SphereGeometry(0.2,6,6), glowMat);
        glow.position.set(px, 5.3, pz); scene.add(glow);
      });
    }
  }
}

function updateNightLights() {
  const n = nightLightPool.length;
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 + car.heading;

function initHeadlights() {

  headlightR = new THREE.SpotLight(0xfff5cc, 3.5, 150, Math.PI/9, 0.35);

function updateHeadlights() {
  if (!headlightL) return;
  const fx = Math.sin(car.heading), fz = Math.cos(car.heading);
  const rx = Math.cos(car.heading), rz = -Math.sin(car.heading);
  headlightL.position.set(car.x - rx*0.5, 1.1, car.z - rz*0.5);
  headlightR.position.set(car.x + rx*0.5, 1.1, car.z + rz*0.5);
  headlightTgtL.position.set(car.x + fx*55 - rx*0.5, 0, car.z + fz*55 - rz*0.5);
  headlightTgtR.position.set(car.x + fx*55 + rx*0.5, 0, car.z + fz*55 + rz*0.5);
}

function buildRain() {
  const count = isMobile ? 1200 : 2600;
  const pos = new Float32Array(count * 6);
  for (let i = 0; i < count; i++) {
    const x = car.x + (Math.random()-.5)*220;
    const y = Math.random() * 62;
    const z = car.z + (Math.random()-.5)*220;
    pos[i*6]=x; pos[i*6+1]=y;   pos[i*6+2]=z;
    pos[i*6+3]=x; pos[i*6+4]=y-1.9; pos[i*6+5]=z;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  const mesh = new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({color:0x99aacc,transparent:true,opacity:0.36}));
  scene.add(mesh);
  return { mesh, pos };
}

function updateRain(rd, dt) {
  const pos = rd.pos, n = pos.length/6;
  for (let i = 0; i < n; i++) {
    pos[i*6+1] -= 30*dt; pos[i*6+4] -= 30*dt;
    if (pos[i*6+1] < -2) {
      const x = car.x+(Math.random()-.5)*220;
      const y = 60+Math.random()*8;
      const z = car.z+(Math.random()-.5)*220;
      pos[i*6]=x; pos[i*6+1]=y;   pos[i*6+2]=z;
      pos[i*6+3]=x; pos[i*6+4]=y-1.9; pos[i*6+5]=z;
    }
  }
  rd.mesh.geometry.attributes.position.needsUpdate = true;
}

function checkCollisions() {
  // Gebäude (AABB)
  for (const b of collidables) {
    if (Math.abs(b.x-car.x) > 52 || Math.abs(b.z-car.z) > 52) continue;
    const dx = car.x-b.x, dz = car.z-b.z;
    if (Math.abs(dx) < b.hw && Math.abs(dz) < b.hd) {
      const ox = b.hw-Math.abs(dx), oz = b.hd-Math.abs(dz);
      if (ox < oz) car.x += Math.sign(dx)*ox; else car.z += Math.sign(dz)*oz;
      car.speed *= 0.18;
      _shakeAmt = Math.max(_shakeAmt, 0.06);
    }
  }
  // NPCs (Radialabstand)
  for (const npc of npcs) {
    const d = Math.hypot(car.x-npc.x, car.z-npc.z);
    if (d < 4 && d > 0.1) {
      const ang = Math.atan2(car.x-npc.x, car.z-npc.z);
      car.x += Math.sin(ang)*(4-d)*0.65;
      car.z += Math.cos(ang)*(4-d)*0.65;
      car.speed *= 0.22;
      _shakeAmt = Math.max(_shakeAmt, 0.055);
    }
  }
}

// ── Physik ────────────────────────────────────────────────────────────────────
const MAX_SPD = 22, ACCEL = 7, BRAKE = 16, DRAG = 1.6, STEER_SPD = 1.6;

function updateCar(dt) {
  // Eingabe zusammenführen
  let throttle = 0, braking = 0, steerIn = 0;

  if (keys['ArrowUp']   || keys['KeyW'] || touch.gas)   throttle = 1;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.brake)  braking  = 1;
  if (keys['Space'])                                      braking  = 2;
  // FIX: Links=Osten=heading+ / Rechts=Westen=heading-
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left)   steerIn  =  1;
  if (keys['ArrowRight']|| keys['KeyD'] || touch.right)  steerIn  = -1;

  // Gamepad
  const gp = getGamepadInput();
  if (gp) {
    const ax = gp.axes[0];
    if (Math.abs(ax) > 0.08) steerIn = -ax; // Gamepad-Achse invertieren (Thrustmaster: Links=-1)
    const rt = gp.buttons[7]?.value ?? 0;
    const lt = gp.buttons[6]?.value ?? 0;
    if (rt > 0.05) throttle = rt;
    if (lt > 0.05) braking  = lt;
    // Thrustmaster: Achse 1/2 könnten Pedale sein
    if (gp.axes.length > 2) {
      const gas   = (-gp.axes[1] + 1) / 2;  // -1=offen → 0, +1=gedrückt → 1
      const brake = (-gp.axes[2] + 1) / 2;
      if (gas   > 0.05) throttle = Math.max(throttle, gas);
      if (brake > 0.05) braking  = Math.max(braking,  brake);
    }
  }

  // KEIN Auto-Pilot – vollständig manuelles Fahren (Auto-Lenkung entfernt)
  // KEIN Auto-Gas – Geschwindigkeit bleibt wo Gas/Bremse sie lässt

  // Geschwindigkeit
  if (throttle > 0) car.speed = Math.min(MAX_SPD, car.speed + ACCEL * throttle * dt);
  else              car.speed = Math.max(0,        car.speed - DRAG * dt);
  if (braking  > 0) car.speed = Math.max(0,        car.speed - BRAKE * braking * dt);

  // Lenkung (sanft interpoliert)
  const sFactor = Math.min(1, car.speed / MAX_SPD);
  car.steer += (steerIn - car.steer) * 6 * dt;
  car.heading += car.steer * STEER_SPD * sFactor * dt;

  // Position
  car.x += Math.sin(car.heading) * car.speed * dt;
  car.z += Math.cos(car.heading) * car.speed * dt;

  // Lenkrad animieren (positives steer = Links → Lenkrad gegen Uhrzeigersinn)
  wheelGrp.rotation.z = car.steer * 0.55;

  checkWaypoint();
  checkCollisions();
}

// ── Kamera setzen ─────────────────────────────────────────────────────────────
function updateCamera() {
  cam.position.set(car.x, 1.25, car.z);
  cam.rotation.y = car.heading + Math.PI;
  cam.rotation.x = 0;
  cam.rotation.z = car.steer * 0.025;
  // Kamera-Shake bei Kollision
  if (_shakeAmt > 0.001) {
    cam.rotation.x += (Math.random()-.5) * _shakeAmt;
    cam.rotation.z += (Math.random()-.5) * _shakeAmt * 0.6;
    _shakeAmt *= 0.80;
  }
}

// ── Minimap ───────────────────────────────────────────────────────────────────
const mmCv  = document.getElementById('mm-cv');
const mmCtx = mmCv.getContext('2d');
let osmRoads = [];   // wird von OSM befüllt

const MM = 160;
// Bounding Box der Route berechnen
const allX = WP.map(w=>w.x), allZ = WP.map(w=>w.z);
const mmMinX = Math.min(...allX)-80, mmMaxX = Math.max(...allX)+80;
const mmMinZ = Math.min(...allZ)-80, mmMaxZ = Math.max(...allZ)+80;

function toMM(wx, wz) {
  return [
    10 + (wx - mmMinX) / (mmMaxX - mmMinX) * (MM-20),
    10 + (wz - mmMinZ) / (mmMaxZ - mmMinZ) * (MM-20),
  ];
}

function drawMinimap() {
  mmCtx.clearRect(0,0,MM,MM);
  mmCtx.fillStyle = '#192219';
  mmCtx.fillRect(0,0,MM,MM);

  // OSM-Hintergrundstraßen
  mmCtx.strokeStyle = '#2a3a2a';
  mmCtx.lineWidth = 1;
  osmRoads.forEach(pts => {
    if (pts.length < 2) return;
    mmCtx.beginPath();
    pts.forEach(([ox,oz],i) => {
      const [px,py] = toMM(ox,oz);
      i===0 ? mmCtx.moveTo(px,py) : mmCtx.lineTo(px,py);
    });
    mmCtx.stroke();
  });

  // Hauptroute (grau)
  mmCtx.strokeStyle='#555'; mmCtx.lineWidth=2.5;
  mmCtx.beginPath();
  WP.forEach((wp,i)=>{const[px,py]=toMM(wp.x,wp.z); i===0?mmCtx.moveTo(px,py):mmCtx.lineTo(px,py);});
  mmCtx.stroke();

  // Zurückgelegte Strecke (blau)
  mmCtx.strokeStyle='#0af'; mmCtx.lineWidth=2;
  mmCtx.beginPath();
  WP.slice(0, car.wpIdx).forEach((wp,i)=>{const[px,py]=toMM(wp.x,wp.z); i===0?mmCtx.moveTo(px,py):mmCtx.lineTo(px,py);});
  const [cpx,cpy] = toMM(car.x, car.z);
  mmCtx.lineTo(cpx, cpy);
  mmCtx.stroke();

  // Wegpunkt-Dots
  WP.forEach((wp,i)=>{
    const[px,py]=toMM(wp.x,wp.z);
    mmCtx.beginPath(); mmCtx.arc(px,py,i<car.wpIdx?3.5:2,0,Math.PI*2);
    mmCtx.fillStyle = i<car.wpIdx ? '#0f8' : '#555';
    mmCtx.fill();
  });

  // Auto (roter Pfeil)
  const[ax,ay]=toMM(car.x,car.z);
  mmCtx.save();
  mmCtx.translate(ax,ay);
  mmCtx.rotate(car.heading);
  mmCtx.fillStyle='#ff3333';
  mmCtx.beginPath(); mmCtx.moveTo(0,-5.5); mmCtx.lineTo(-3.5,4); mmCtx.lineTo(3.5,4);
  mmCtx.closePath(); mmCtx.fill();
  mmCtx.restore();
}

// ── OSM-Gebäude: Hilfsfunktionen ─────────────────────────────────────────────

function nearRoute(cx, cz, maxDist) {
  for (const wp of WP)
    if (Math.hypot(cx - wp.x, cz - wp.z) < maxDist) return true;
  return false;
}

function makeFacadeTex(wallColor, isNight, seed) {
  const W = 256, H = 512;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const r = (wallColor >> 16) & 0xff;
  const g = (wallColor >> 8)  & 0xff;
  const b =  wallColor        & 0xff;

  // Wand-Grundfarbe
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, W, H);

  // Subtile Horizontalfugen (Putzstruktur)
  ctx.strokeStyle = 'rgba(0,0,0,0.055)'; ctx.lineWidth = 0.6;
  for (let y = 9; y < H; y += 9) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Fenster (4 Reihen × 3 Spalten)
  const ROWS = 4, COLS = 3;
  const GF_H = Math.round(H * 0.19);
  const WIN_H = Math.round((H - GF_H) / ROWS);
  const WIN_W = Math.round(W / COLS);
  const ww = 36, wh = Math.round(WIN_H * 0.58);

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const wx = col * WIN_W + Math.round((WIN_W - ww) / 2);
      const wy = Math.round(row * WIN_H + (WIN_H - wh) / 2);
      const lit = isNight && ((seed * 7 + row * 5 + col * 3) % 4 > 0);
      ctx.fillStyle = lit
        ? `rgba(255,235,155,0.92)`
        : `rgba(${r-45},${g-35},${b-25},0.55)`;
      ctx.fillRect(wx, wy, ww, wh);
      // Rahmen
      ctx.strokeStyle = `rgba(${r+22},${g+18},${b+14},0.55)`;
      ctx.lineWidth = 1.5; ctx.strokeRect(wx, wy, ww, wh);
      // Fensterkreuz
      ctx.beginPath();
      ctx.moveTo(wx+ww/2, wy); ctx.lineTo(wx+ww/2, wy+wh);
      ctx.moveTo(wx, wy+wh*0.44); ctx.lineTo(wx+ww, wy+wh*0.44);
      ctx.strokeStyle = `rgba(${r+22},${g+18},${b+14},0.3)`;
      ctx.lineWidth = 0.8; ctx.stroke();
    }
  }

  // Erdgeschoss
  ctx.fillStyle = 'rgba(0,0,0,0.13)';
  ctx.fillRect(0, H - GF_H, W, GF_H);
  if (seed % 2 === 0) {
    // Schaufenster
    ctx.fillStyle = 'rgba(150,195,235,0.62)';
    ctx.fillRect(10, H-GF_H+9, W-20, GF_H-18);
  } else {
    // Haustür + seitliche Fenster
    ctx.fillStyle = 'rgba(55,38,20,0.82)';
    ctx.fillRect(W/2-14, H-GF_H+9, 28, GF_H-13);
    ctx.fillStyle = 'rgba(135,175,220,0.5)';
    ctx.fillRect(16, H-GF_H+13, 22, GF_H-22);
    ctx.fillRect(W-38, H-GF_H+13, 22, GF_H-22);
  }

  // Dachgesims
  ctx.fillStyle = 'rgba(0,0,0,0.24)'; ctx.fillRect(0, 0, W, 13);

  return new THREE.CanvasTexture(cv);
}

function buildOSMBuildings(elements, nodes) {
  const isNight = cfg.time === 'night';

  // 8 Fassaden-Varianten (Material-Paare [Dach, Wand]), geteilt über alle Gebäude
  const WALL_COLS = [0xd4c5a9, 0xc9b89a, 0xb8b0a8, 0xa89e9a,
                     0xc8a882, 0xbba070, 0xb4c0b4, 0xc8beb0];
  const ROOF_COLS = [0x4a4540, 0x484848, 0x515548, 0x454040];
  const matPairs  = WALL_COLS.map((wc, i) => {
    const tex = makeFacadeTex(wc, isNight, i);
    tex.wrapS = THREE.RepeatWrapping;
    tex.repeat.set(3, 1);   // ~3 Wiederholungen über Gebäudeumfang
    return [
      new THREE.MeshLambertMaterial({ color: ROOF_COLS[i % ROOF_COLS.length] }),
      new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide }),
    ];
  });

  const maxBld = isMobile ? 130 : 400;
  let count = 0;

  elements.filter(e => e.type === 'way' && e.tags && e.tags.building).forEach(way => {
    if (count >= maxBld) return;

    const pts = way.nodes.map(id => nodes[id]).filter(Boolean);
    if (pts.length < 4) return;

    const cx = pts.reduce((s,p) => s+p[0], 0) / pts.length;
    const cz = pts.reduce((s,p) => s+p[1], 0) / pts.length;
    if (!nearRoute(cx, cz, 72)) return;

    // Fläche (Shoelace)
    let area2 = 0;
    for (let i = 0; i < pts.length; i++) {
      const [ax,az] = pts[i], [bx,bz] = pts[(i+1) % pts.length];
      area2 += ax*bz - bx*az;
    }
    if (Math.abs(area2) / 2 < 14) return;

    // Höhe aus OSM-Tag oder deterministisch geschätzt
    const lvls = parseInt(way.tags['building:levels'] || '') ||
                 (2 + Math.abs(Math.round(cx*11 + cz*7)) % 5);
    const height = lvls * 3.15 + 1.5;

    // Shape: (x, -z) dann rotateX(-π/2) → korrekte Weltposition
    // area2>0 = CCW in XZ; nach -z-Negation CW → umkehren für richtiges Face-Normal
    const raw = pts.slice(0, -1);  // letzter Punkt = erster → überspringen
    const ordered = area2 > 0 ? [...raw].reverse() : raw;

    const shape = new THREE.Shape();
    shape.moveTo(ordered[0][0], -ordered[0][1]);
    for (let i = 1; i < ordered.length; i++)
      shape.lineTo(ordered[i][0], -ordered[i][1]);

    let geo;
    try {
      geo = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false });
    } catch(e) { return; }
    geo.rotateX(-Math.PI / 2);

    const mIdx = Math.abs(Math.round(cx*5 + cz*9)) % matPairs.length;
    const mesh = new THREE.Mesh(geo, matPairs[mIdx]);
    mesh.position.y = 0;
    scene.add(mesh);

    // AABB für Kollisionserkennung
    const minX = Math.min(...pts.map(p=>p[0])), maxX = Math.max(...pts.map(p=>p[0]));
    const minZ = Math.min(...pts.map(p=>p[1])), maxZ = Math.max(...pts.map(p=>p[1]));
    collidables.push({ x:(minX+maxX)/2, z:(minZ+maxZ)/2,
                       hw:(maxX-minX)/2+0.5, hd:(maxZ-minZ)/2+0.5 });
    count++;
  });

  console.log(`OSM-Gebäude: ${count} extrudiert`);
  return count;
}

// ── OSM-Daten laden (Overpass API) ───────────────────────────────────────────
async function loadOSM() {
  // Bbox erweitert: deckt komplette Route inkl. Stadion-Bereich ab
  const bbox = '50.926,6.868,50.972,6.944';
  // Kombinierte Abfrage: Straßen + Gebäude in einem Request
  const q = `[out:json][timeout:50];(
    way["highway"~"^(primary|secondary|tertiary|residential|unclassified|living_street|service)$"](${bbox});
    way["building"](${bbox});
  );(._;>;);out body;`;
  const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`;

  try {
    const res  = await fetch(url);
    const data = await res.json();

    // Node-Lookup bauen
    const nodes = {};
    data.elements.filter(e=>e.type==='node').forEach(n=>{
      const pos = ll(n.lat, n.lon);
      nodes[n.id] = [pos.x, pos.z];
    });

    // Straßen (nur Ways mit highway-Tag)
    const osmMat = new THREE.MeshBasicMaterial({ color:0x1e2e1e });
    let roadCount = 0;
    data.elements.filter(e=>e.type==='way' && e.tags && e.tags.highway).forEach(way => {
      const pts = way.nodes.map(id=>nodes[id]).filter(Boolean);
      if (pts.length < 2) return;
      osmRoads.push(pts);
      for (let i = 0; i < pts.length-1; i++) {
        const [ax,az] = pts[i], [bx,bz] = pts[i+1];
        scene.add(new THREE.Mesh(roadGeo(ax,az,bx,bz, 5.5, 0.005), osmMat));
        roadCount++;
      }
    });

    // Gebäude extrudieren (OSM-Footprints)
    const bldCount = buildOSMBuildings(data.elements, nodes);

    document.getElementById('osm-lbl').textContent =
      `🗺 OSM ✓ (${roadCount} Str. · ${bldCount} Geb.)`;
    setTimeout(() => document.getElementById('osm-lbl').style.opacity='0', 5000);
  } catch(err) {
    console.warn('OSM nicht geladen:', err);
    document.getElementById('osm-lbl').textContent = '🗺 OSM (offline)';
    setTimeout(() => document.getElementById('osm-lbl').style.opacity='0', 3000);
  }
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Animation Loop ────────────────────────────────────────────────────────────
let lastT = performance.now();
const clock = new THREE.Clock();

function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  const elapsed = clock.getElapsedTime();

  updateCar(dt);
  updateNPCs(dt);
  updateCamera();
  updateHeadlights();
  if (nightLightPool.length) updateNightLights();
  if (rainData) updateRain(rainData, dt);
  if (cfg.weather === 'rain') wiperPivot.rotation.y = Math.sin(elapsed * 2.3) * 0.52;
  updateTrafficLights(elapsed);
  drawMinimap();
  updateNavHUD();
  updateVoice();
  updateLimitHUD();
  updateEngineSound();

  document.getElementById('spd').textContent = Math.round(car.speed * 3.6);
  renderer.render(scene, cam);
}

// ── Konfiguration anwenden ────────────────────────────────────────────────────
(function applyConfig() {
  const isNight = cfg.time    === 'night';
  const isRain  = cfg.weather === 'rain';

  // Himmel + Nebel
  let skyCol, fogNear, fogFar;
  if (isNight && isRain) {
    skyCol=0x030810; fogNear=16; fogFar=isMobile?120:210;
  } else if (isNight) {
    skyCol=0x040810; fogNear=25; fogFar=isMobile?175:340;
  } else if (isRain) {
    skyCol=0x7a8fa8; fogNear=40; fogFar=isMobile?260:560;
  } else {
    skyCol=0x6ab4e8; fogNear=150; fogFar=isMobile?600:1100;
  }
  scene.background = new THREE.Color(skyCol);
  scene.fog = new THREE.Fog(skyCol, fogNear, fogFar);

  if (isNight) { applyNightMode(); buildStreetLamps(); }
  if (isNight || isRain) initHeadlights();
  if (isRain)  { rainData = buildRain(); wiperPivot.visible = true; }
})();

// ── Start ─────────────────────────────────────────────────────────────────────
initNPCs();
document.getElementById('limit-val').textContent = streetLimit(WP[0].street);
toast('🚦 Start: Altbaumburgweg, Bilderstöckchen');
loadOSM();
requestAnimationFrame(loop);

} // Ende startSimulator()
