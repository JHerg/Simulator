// ─── Road Builder ─────────────────────────────────────────────────────────
function buildRoad(pts) {
  const roadGroup = new THREE.Group();
  const roadMat   = new THREE.MeshLambertMaterial({ color: 0x333333 });
  const lineMat   = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const W = 7.0; // Straßenbreite

  for (let i = 0; i < pts.length - 1; i++) {
    const A = new THREE.Vector3(pts[i].x,   0, pts[i].z);
    const B = new THREE.Vector3(pts[i+1].x, 0, pts[i+1].z);
    const dir = new THREE.Vector3().subVectors(B, A);
    const len = dir.length();
    dir.normalize();

    const angle = Math.atan2(dir.x, dir.z);

    // Asphalt
    const rGeo = new THREE.PlaneGeometry(W, len);
    const rMesh = new THREE.Mesh(rGeo, roadMat);
    rMesh.rotation.x = -Math.PI / 2;
    rMesh.rotation.z = -angle;  // PlaneGeometry liegt in XY, wir drehen um Z vor der X-Rotation
    // Korrekte Positionierung: Mitte zwischen A und B
    rMesh.position.set((A.x + B.x) / 2, 0.01, (A.z + B.z) / 2);
    // Wir verwenden lookAt-Trick:
    const mid = new THREE.Vector3((A.x+B.x)/2, 0, (A.z+B.z)/2);
    rMesh.position.copy(mid);
    rMesh.position.y = 0.01;
    rMesh.lookAt(B.x, 0, B.z);
    rMesh.rotateX(-Math.PI/2);
    rMesh.scale.x = W;
    rMesh.scale.y = len;
    rMesh.receiveShadow = true;
    roadGroup.add(rMesh);

    // Mittellinie (gestrichelt simuliert durch kurze Segmente)
    const dashCount = Math.floor(len / 8);
    for (let d = 0; d < dashCount; d++) {
      const t = (d + 0.5) / dashCount;
      const pos = new THREE.Vector3().lerpVectors(A, B, t);
      const dashGeo = new THREE.PlaneGeometry(0.15, 3.0);
      const dash = new THREE.Mesh(dashGeo, lineMat);
      dash.position.copy(pos);
      dash.position.y = 0.02;
      dash.lookAt(B.x, 0, B.z);
      dash.rotateX(-Math.PI / 2);
      roadGroup.add(dash);
    }

    // Bordsteine / Randlinien
    [-W/2 - 0.2, W/2 + 0.2].forEach(offset => {
      const cGeo = new THREE.PlaneGeometry(0.4, len);
      const cMesh = new THREE.Mesh(cGeo, new THREE.MeshLambertMaterial({ color: 0xddddcc }));
      // Offset senkrecht zur Fahrtrichtung
      const perp = new THREE.Vector3(-dir.z, 0, dir.x).multiplyScalar(offset);
      cMesh.position.copy(mid).add(perp);
      cMesh.position.y = 0.015;
      cMesh.lookAt(B.x + perp.x, 0, B.z + perp.z);
      cMesh.rotateX(-Math.PI / 2);
      cMesh.scale.y = len;
      roadGroup.add(cMesh);
    });
  }
  return roadGroup;
}

scene.add(buildRoad(WAYPOINTS));

// ─── Gebäude ──────────────────────────────────────────────────────────────
const buildingColors = [0xd4a574, 0xc8b89a, 0xbfae9e, 0xe8d5b7, 0xa8956e, 0xcc9966];
const rng = (seed) => { let s = seed; return () => { s = (s*16807+0) % 2147483647; return (s-1)/2147483646; }; };
const rand = rng(42);

function addBuildings() {
  const bGroup = new THREE.Group();
  WAYPOINTS.forEach((wp, i) => {
    if (i === WAYPOINTS.length - 1) return;
    const next = WAYPOINTS[i + 1];
    const dir = new THREE.Vector3(next.x - wp.x, 0, next.z - wp.z).normalize();
    const perp = new THREE.Vector3(-dir.z, 0, dir.x);
    const segLen = Math.hypot(next.x - wp.x, next.z - wp.z);
    const count = Math.floor(segLen / 18);

    for (let b = 0; b < count; b++) {
      const t = (b + 0.5) / count;
      const base = new THREE.Vector3(wp.x + (next.x-wp.x)*t, 0, wp.z + (next.z-wp.z)*t);
      [-1, 1].forEach(side => {
        const w = 8  + rand() * 10;
        const h = 6  + rand() * 22;
        const d = 8  + rand() * 10;
        const offset = 8 + rand() * 5;
        const pos = base.clone().addScaledVector(perp, side * offset);
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshLambertMaterial({
          color: buildingColors[Math.floor(rand() * buildingColors.length)]
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(pos.x + (rand()-0.5)*4, h/2, pos.z + (rand()-0.5)*4);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        bGroup.add(mesh);

        // Fenster (einfache helle Rechtecke auf der Fassade)
        if (h > 10) {
          const winMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
          for (let wy = 2; wy < h - 1; wy += 3) {
            for (let wx = -w/2+1; wx < w/2-0.5; wx += 2.5) {
              const wGeo = new THREE.PlaneGeometry(0.9, 1.2);
              const wMesh = new THREE.Mesh(wGeo, winMat);
              wMesh.position.set(
                mesh.position.x + wx,
                wy,
                mesh.position.z + (side > 0 ? -d/2 - 0.01 : d/2 + 0.01)
              );
              if (side < 0) wMesh.rotation.y = Math.PI;
              bGroup.add(wMesh);
            }
          }
        }
      });
    }
  });
  return bGroup;
}
scene.add(addBuildings());

// ─── Bäume ────────────────────────────────────────────────────────────────
function addTrees() {
  const tGroup = new THREE.Group();
  const trunkMat  = new THREE.MeshLambertMaterial({ color: 0x6b4226 });
  const crownMat  = new THREE.MeshLambertMaterial({ color: 0x2d7a2d });
  const crownMat2 = new THREE.MeshLambertMaterial({ color: 0x1e6b1e });
  const rand2 = rng(77);

  WAYPOINTS.forEach((wp, i) => {
    if (i >= WAYPOINTS.length - 1) return;
    const next = WAYPOINTS[i + 1];
    const dir = new THREE.Vector3(next.x - wp.x, 0, next.z - wp.z).normalize();
    const perp = new THREE.Vector3(-dir.z, 0, dir.x);
    const segLen = Math.hypot(next.x - wp.x, next.z - wp.z);
    const count = Math.floor(segLen / 12);

    for (let t = 0; t < count; t++) {
      const frac = t / count;
      const base = new THREE.Vector3(wp.x + (next.x-wp.x)*frac, 0, wp.z + (next.z-wp.z)*frac);
      [-1, 1].forEach(side => {
        if (rand2() > 0.55) return; // nicht überall Bäume
        const offset = 6 + rand2() * 3;
        const pos = base.clone().addScaledVector(perp, side * offset);
        const h = 4 + rand2() * 3;
        // Stamm
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, h, 6), trunkMat);
        trunk.position.set(pos.x, h/2, pos.z);
        trunk.castShadow = true;
        tGroup.add(trunk);
        // Krone
        const cr = 1.5 + rand2() * 1.5;
        const crown = new THREE.Mesh(new THREE.SphereGeometry(cr, 7, 7), rand2() > 0.5 ? crownMat : crownMat2);
        crown.position.set(pos.x, h + cr*0.6, pos.z);
        crown.castShadow = true;
        tGroup.add(crown);
      });
    }
  });
  return tGroup;
}

// ─── Fahrzeug-Zustand ─────────────────────────────────────────────────────

// ─── Automatische Wegpunkt-Navigation (Auto-Pilot Hilfe) ──────────────────
// Das Auto lenkt sanft zum nächsten Wegpunkt.
// Spieler kann mit Tasten übersteuern.

function autoSteer(dt) {
  if (car.wpIdx >= WAYPOINTS.length) return 0;
  const target = WAYPOINTS[car.wpIdx];
  const tx = target.x - car.pos.x;
  const tz = target.z - car.pos.z;
  const targetAngle = Math.atan2(tx, tz);
  let diff = targetAngle - car.heading;
  // Normalize -π .. π
  while (diff >  Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  return Math.max(-1, Math.min(1, diff * 1.5));
}

function checkWaypoint() {
  if (car.wpIdx >= WAYPOINTS.length) return;
  const wp = WAYPOINTS[car.wpIdx];
  const dist = Math.hypot(wp.x - car.pos.x, wp.z - car.pos.z);
  if (dist < 12) {
    showWaypointMsg('📍 ' + wp.name);
    car.wpIdx++;
    updateProgress();
    if (car.wpIdx >= WAYPOINTS.length) {
      setTimeout(() => showWaypointMsg('🏟️ Ziel erreicht! RheinEnergie Stadion'), 500);
    }
  }
}

// ─── Minimap ──────────────────────────────────────────────────────────────
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx    = mmCanvas.getContext('2d');
const MM_W = 180, MM_H = 180;

function drawMinimap() {
  mmCtx.clearRect(0, 0, MM_W, MM_H);
  mmCtx.fillStyle = '#1a2a1a';
  mmCtx.fillRect(0, 0, MM_W, MM_H);

  // Skalierung: Route passt in Minimap
  const allX = WAYPOINTS.map(w => w.x);
  const allZ = WAYPOINTS.map(w => w.z);
  const minX = Math.min(...allX), maxX = Math.max(...allX);
  const minZ = Math.min(...allZ), maxZ = Math.max(...allZ);
  const scaleX = (MM_W - 20) / (maxX - minX + 1);
  const scaleZ = (MM_H - 20) / (maxZ - minZ + 1);
  const scale  = Math.min(scaleX, scaleZ);
  const offX = 10 + (MM_W - 20 - (maxX-minX)*scale) / 2;
  const offZ = 10;

  const toMM = (wx, wz) => ({
    x: offX + (wx - minX) * scale,
    y: offZ + (wz - minZ) * scale
  });

  // Route zeichnen
  mmCtx.strokeStyle = '#555'; mmCtx.lineWidth = 3;
  mmCtx.beginPath();
  WAYPOINTS.forEach((wp, i) => {
    const p = toMM(wp.x, wp.z);
    i === 0 ? mmCtx.moveTo(p.x, p.y) : mmCtx.lineTo(p.x, p.y);
  });
  mmCtx.stroke();

  // Zurückgelegte Route
  mmCtx.strokeStyle = '#0af'; mmCtx.lineWidth = 2;
  mmCtx.beginPath();
  WAYPOINTS.slice(0, car.wpIdx).forEach((wp, i) => {
    const p = toMM(wp.x, wp.z);
    i === 0 ? mmCtx.moveTo(p.x, p.y) : mmCtx.lineTo(p.x, p.y);
  });
  // bis aktuelle Pos
  const cp = toMM(car.pos.x, car.pos.z);
  mmCtx.lineTo(cp.x, cp.y);
  mmCtx.stroke();

  // Wegpunkte
  WAYPOINTS.forEach((wp, i) => {
    const p = toMM(wp.x, wp.z);
    mmCtx.beginPath();
    mmCtx.arc(p.x, p.y, i < car.wpIdx ? 3 : 2, 0, Math.PI*2);
    mmCtx.fillStyle = i < car.wpIdx ? '#0f8' : '#888';
    mmCtx.fill();
  });

  // Auto-Dreieck
  mmCtx.save();
  mmCtx.translate(cp.x, cp.y);
  mmCtx.rotate(car.heading);
  mmCtx.fillStyle = '#ff4444';
  mmCtx.beginPath();
  mmCtx.moveTo(0, -5); mmCtx.lineTo(-3, 4); mmCtx.lineTo(3, 4);
  mmCtx.closePath();
  mmCtx.fill();
  mmCtx.restore();
}

// ─── Game Loop ────────────────────────────────────────────────────────────
const MAX_SPEED  = 22;  // ~80 km/h
const ACCEL_RATE = 6;
const BRAKE_RATE = 14;
const DRAG       = 1.8;
const STEER_RATE = 1.4;
const STEER_RETURN = 3.0;

let lastTime = performance.now();
const clock = new THREE.Clock();

function update(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  // ── Eingabe lesen ──
  let throttle = 0, braking = 0, steerInput = 0;

  if (keys['ArrowUp']   || keys['KeyW']) throttle =  1;
  if (keys['ArrowDown'] || keys['KeyS']) braking  =  1;
  if (keys['ArrowLeft'] || keys['KeyA']) steerInput = -1;
  if (keys['ArrowRight']|| keys['KeyD']) steerInput =  1;
  if (keys['Space'])                     braking  =  2;

  // Gamepad
  if (gamepad) {
    const gp = navigator.getGamepads()[gamepad.index];
    if (gp) {
      const leftX  = gp.axes[0];
      const rt     = (gp.buttons[7]?.value ?? 0);
      const lt     = (gp.buttons[6]?.value ?? 0);
      if (Math.abs(leftX) > 0.08) steerInput = leftX;
      if (rt > 0.05) throttle = rt;
      if (lt > 0.05) braking  = lt;
    }
  }

  // Auto-Pilot Lenkung (falls kein manueller Input)
  const autoS = autoSteer(dt);
  if (Math.abs(steerInput) < 0.05) steerInput = autoS * 0.6;

  // Wenn kein manueller Antrieb: sanft beschleunigen (Demo-Modus)
  if (throttle === 0 && car.speed < 14 && car.wpIdx < WAYPOINTS.length) {
    throttle = 0.7;
  }

  // ── Physik ──
  if (throttle > 0) {
    car.speed = Math.min(MAX_SPEED, car.speed + ACCEL_RATE * throttle * dt);
  } else {
    car.speed = Math.max(0, car.speed - DRAG * dt);
  }
  if (braking > 0) {
    car.speed = Math.max(0, car.speed - BRAKE_RATE * braking * dt);
  }

  // Lenkung (nur bei Fahrt)
  const steerFactor = car.speed / MAX_SPEED;
  car.steer += (steerInput - car.steer) * STEER_RATE * dt * 5;
  car.heading += car.steer * STEER_RATE * steerFactor * dt * 1.5;

  // Lenkrad rotieren
  const steeringWheel = cockpitGroup.children.find(c => c === camera.children[0]?.children[1]);
  // Zugriff über wheelGroup (Index 1 in cockpitGroup)
  if (cockpitGroup.children[1]) {
    cockpitGroup.children[1].rotation.z = -car.steer * 0.6;
  }

  // Position aktualisieren
  car.pos.x += Math.sin(car.heading) * car.speed * dt;
  car.pos.z += Math.cos(car.heading) * car.speed * dt;

  checkWaypoint();

  // ── Kamera positionieren ──
  camera.position.set(
    car.pos.x,
    CAM_HEIGHT,
    car.pos.z
  );
  camera.rotation.order = 'YXZ';
  camera.rotation.y = car.heading + Math.PI; // Blickrichtung = Fahrtrichtung
  camera.rotation.x = 0;
  camera.rotation.z = car.steer * -0.03; // leichtes Rollen beim Lenken

  // ── Speedometer ──
  document.getElementById('speed-val').textContent = Math.round(car.speed * 3.6);

  // ── Minimap ──
  drawMinimap();

  // ── Render ──
  renderer.render(scene, camera);
  requestAnimationFrame(update);
}

// ─── Resize ───────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
renderer.setSize(window.innerWidth, window.innerHeight);

// ─── Start ────────────────────────────────────────────────────────────────
showWaypointMsg('🚦 Start: Altbaumburgweg, Bilderstöckchen');
updateProgress();
requestAnimationFrame(update);
</script>
</body>
